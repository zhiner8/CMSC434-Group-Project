<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Lists</title>
    <link rel="stylesheet" href="../styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>

    <style>
      #shopping-list-container {
        margin: 20px;
      }

      #shopping-list input[type="text"] {
        width: 70%;
        padding: 5px;
      }

      #shopping-list button {
        padding: 5px 10px;
        margin-left: 5px;
      }

      ul {
        list-style-type: none;
        padding: 0;
      }

      li {
        padding: 8px;
        border-bottom: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      li.checked span {
        text-decoration: line-through;
        color: gray;
      }

      .item-buttons button {
        margin-left: 5px;
      }

      .move-button {
        margin-top: 10px;
        padding: 5px 10px;
      }
    </style>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Shopping Lists</h1>
          <a href="create-list.html" id="create-button">
            <i class="fa-solid fa-plus"></i>
          </a>
        </div>
        <div id="saved-lists-container">
          <div id="lists-wrapper"></div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">My Kitchen</a>
          <a href="recipe-book.html" class="nav-buttons">Recipe Book</a>
          <a href="shopping.html" class="nav-buttons" id="selected">Shopping Lists</a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const listsWrapper = document.getElementById("lists-wrapper");

      function renderSavedLists() {
        const savedLists = getShoppingLists();
        listsWrapper.innerHTML = "";

        if (savedLists.length === 0) {
          listsWrapper.innerHTML = "<p>No shopping lists yet.</p>";
          return;
        }

        savedLists.forEach((list, index) => {
          const listCard = document.createElement("div");
          listCard.className = "saved-list-card";

          let itemsHTML = "";
          list.items.forEach((item) => {
            const name = typeof item === "object" ? item.name : item;
            itemsHTML += `<li>${name}</li>`;
          });

          listCard.innerHTML = `
            <h2>${list.name || "List #" + (index + 1)}</h2>
            <ul class="saved-items-list">
              ${itemsHTML}
            </ul>
          `;

          listsWrapper.appendChild(listCard);
        });
      }

      renderSavedLists();
    </script>
  </body>
</html>
