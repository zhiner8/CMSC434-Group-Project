<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Lists</title>
    <link rel="stylesheet" href="../styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/75ab6db391.js"
      crossorigin="anonymous"
    ></script>
    <script src="../storage.js"></script>
    <style>
      #modal-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 10;
        justify-content: center;
        align-items: center;
      }
      #modal-overlay.open {
        display: flex;
      }
      #new-list-modal {
        background: var(--off-white);
        border-radius: 16px;
        padding: 24px;
        width: 80%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #new-list-modal h3 {
        color: var(--dark-text);
        margin: 0;
        font-size: 22px;
      }
      #new-list-modal p {
        color: var(--dark-text);
        margin: 0;
        font-size: 16px;
      }
      #modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 4px;
      }
      #modal-buttons button {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }
      #btn-new {
        background: var(--accent-blue-1);
        color: var(--off-white);
      }
      #btn-starter {
        background: var(--accent-blue-2);
        color: var(--off-white);
      }
      #btn-cancel {
        background: #ccc;
        color: var(--dark-text);
      }

      #saved-lists-container {
        padding: 16px 20px;
        overflow-y: auto;
      }

      #saved-lists {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .list-entry-button {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
        padding: 18px 20px;
        background: white;
        border: none;
        border-radius: 16px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        cursor: pointer;
        text-align: left;
        transition: background-color 0.15s ease;
        box-sizing: border-box;
      }

      .list-entry-button:hover {
        background-color: #e8eef2;
      }

      .list-entry-name {
        font-size: 24px;
        font-weight: 500;
        color: var(--accent-blue-1);
        margin: 0 0 6px 0;
      }

      .list-entry-description {
        font-size: 17px;
        font-weight: 400;
        color: #555;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Shopping Lists</h1>
          <button id="create-button" onclick="openModal()">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <div id="saved-lists-container">
          <div id="saved-lists"></div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons"
            ><i class="fas fa-home"></i
          ></a>
          <a href="recipe-book.html" class="nav-buttons"
            ><i class="fas fa-book"></i
          ></a>
          <a href="shopping.html" class="nav-buttons" id="selected"
            ><i class="fas fa-list-ul"></i
          ></a>
        </div>

        <div id="modal-overlay">
          <div id="new-list-modal">
            <h3>New List</h3>
            <p>How would you like to start?</p>
            <div id="modal-buttons">
              <button id="btn-cancel" onclick="closeModal()">Cancel</button>
              <button id="btn-starter" onclick="goToStarterList()">
                Starter List
              </button>
              <button id="btn-new" onclick="goToNewList()">From New</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      initStorage();
      const listsWrapper = document.getElementById("saved-lists");
      const modalOverlay = document.getElementById("modal-overlay");

      function openModal() {
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function goToNewList() {
        window.location.href = "create-list.html";
      }

      function goToStarterList() {
        window.location.href = "starter-lists.html";
        closeModal();
      }

      modalOverlay.addEventListener("click", function (e) {
        if (e.target === modalOverlay) closeModal();
      });

      function renderSavedLists() {
        const savedLists = getShoppingLists();
        console.log(savedLists);
        listsWrapper.innerHTML = "";

        if (savedLists.length === 0) {
          listsWrapper.innerHTML = "<p>No shopping lists yet.</p>";
          return;
        }

        savedLists.forEach((list, index) => {
          const btn = document.createElement("button");
          btn.className = "list-entry-button";
          btn.innerHTML = `
            <p class="list-entry-name">${
              list.name || "List #" + (index + 1)
            }</p>
            <p class="list-entry-description">${list.description || ""}</p>
          `;
          btn.addEventListener("click", () => {
            window.location.href = `display-list.html?id=${list.id}`;
          });
          listsWrapper.appendChild(btn);
        });
      }

      renderSavedLists();
    </script>
  </body>
</html>
