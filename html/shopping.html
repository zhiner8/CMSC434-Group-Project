<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Lists</title>
    <link rel="stylesheet" href="../styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>

    <style>
      #shopping-list-container {
        margin: 20px;
      }

      #shopping-list input[type="text"] {
        width: 70%;
        padding: 5px;
      }

      #shopping-list button {
        padding: 5px 10px;
        margin-left: 5px;
      }

      ul {
        list-style-type: none;
        padding: 0;
      }

      li {
        padding: 8px;
        border-bottom: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      li.checked span {
        text-decoration: line-through;
        color: gray;
      }

      .item-buttons button {
        margin-left: 5px;
      }

      .move-button {
        margin-top: 10px;
        padding: 5px 10px;
      }
    </style>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Kitchen Kompanion</h1>
        </div>

        <div id="shopping-list-container">
          <h2>My Shopping List</h2>
          <div id="shopping-list">
            <input type="text" id="item-input" placeholder="Add new item..." />
            <button id="add-item">Add</button>
          </div>

          <ul id="items-ul"></ul>
          <button id="move-unchecked" class="move-button">
            Move Unpurchased Items to Next List
          </button>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">My Kitchen</a>
          <a href="recipe-book.html" class="nav-buttons">Recipe Book</a>
          <a href="shopping.html" class="nav-buttons" id="selected">Shopping Lists</a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const itemInput = document.getElementById("item-input");
      const addItemButton = document.getElementById("add-item");
      const itemsUl = document.getElementById("items-ul");
      const moveButton = document.getElementById("move-unchecked");

      let shoppingList = [];

      function renderList() {
        itemsUl.innerHTML = "";
        shoppingList.forEach((item, index) => {
          const li = document.createElement("li");
          li.className = item.checked ? "checked" : "";
          li.innerHTML = `
            <span>${item.name}</span>
            <div class="item-buttons">
              <button onclick="toggleItem(${index})">
                ${item.checked ? "Undo" : "Check"}
              </button>
              <button onclick="removeItem(${index})">Remove</button>
            </div>
          `;
          itemsUl.appendChild(li);
        });
      }

      function addItem() {
        const itemName = itemInput.value.trim();
        if (itemName) {
          shoppingList.push({ name: itemName, checked: false });
          itemInput.value = "";
          renderList();
        }
      }

      function toggleItem(index) {
        shoppingList[index].checked = !shoppingList[index].checked;
        renderList();
      }

      function removeItem(index) {
        shoppingList.splice(index, 1);
        renderList();
      }

      function moveUnchecked() {
        const uncheckedItems = shoppingList.filter((item) => !item.checked);
        if (uncheckedItems.length === 0) {
          alert("No unchecked items to move!");
          return;
        }
        shoppingList = uncheckedItems.map((item) => ({
          ...item,
          checked: false,
        }));
        renderList();
        alert("Unchecked items moved to the next list!");
      }

      addItemButton.addEventListener("click", addItem);
      itemInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addItem();
      });
      moveButton.addEventListener("click", moveUnchecked);

      renderList();
    </script>
  </body>
</html>
