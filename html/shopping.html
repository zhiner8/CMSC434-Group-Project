<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Lists</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>
    <style>
      #modal-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 10;
        justify-content: center;
        align-items: center;
      }
      #modal-overlay.open {
        display: flex;
      }
      #new-list-modal {
        background: var(--off-white);
        border-radius: 16px;
        padding: 24px;
        width: 80%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #new-list-modal h3 {
        color: var(--dark-text);
        margin: 0;
        font-size: 22px;
      }
      #new-list-modal p {
        color: var(--dark-text);
        margin: 0;
        font-size: 16px;
      }
      #modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 4px;
      }
      #modal-buttons button {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }
      #btn-new {
        background: var(--accent-blue-1);
        color: var(--off-white);
      }
      #btn-starter {
        background: var(--accent-blue-2);
        color: var(--off-white);
      }
      #btn-cancel {
        background: #ccc;
        color: var(--dark-text);
      }
    </style>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Shopping Lists</h1>
        </div>

        <div id="inventory-container">
          <div id="inventory-toolbar">
            <div id="search-wrapper">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="search-input" placeholder="Search lists..." />
            </div>
            <div id="toolbar-buttons">
              <button id="add-button"><i class="fas fa-plus"></i></button>
              <button id="edit-button"><i class="fas fa-pen"></i></button>
            </div>
          </div>

          <div id="inventory-table-wrapper">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th class="edit-column hidden">Action</th>
                </tr>
              </thead>
              <tbody id="lists-table-body"></tbody>
            </table>
          </div>
        </div>

        <div id="modal-overlay">
          <div id="new-list-modal">
            <h3>New List</h3>
            <p>How would you like to start?</p>
            <div id="modal-buttons">
              <button id="btn-cancel" onclick="closeModal()">Cancel</button>
              <button id="btn-starter" onclick="goToStarterList()">Favorite List</button>
              <button id="btn-new" onclick="goToNewList()">Create New List</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons"><i class="fas fa-home"></i></a>
          <a href="recipe-book.html" class="nav-buttons"><i class="fas fa-book"></i></a>
          <a href="shopping.html" class="nav-buttons" id="selected"><i class="fas fa-list-ul"></i></a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const listsTableBody = document.getElementById("lists-table-body");
      const searchInput = document.getElementById("search-input");
      const editButton = document.getElementById("edit-button");
      const modalOverlay = document.getElementById("modal-overlay");

      let editMode = false;

      function openModal() {
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function goToNewList() {
        window.location.href = "create-list.html";
      }

      function goToStarterList() {
        closeModal();
        window.location.href = "starter-lists.html";
      }

      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) closeModal();
      });

      function renderLists() {
        const savedLists = getShoppingLists();
        const query = searchInput.value.toLowerCase().trim();
        listsTableBody.innerHTML = "";

        const filtered = savedLists.filter((l) =>
          (l.name || "").toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
          listsTableBody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:gray;">No lists found.</td></tr>`;
          return;
        }

        filtered.forEach((list) => {
          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          tr.innerHTML = `
            <td>${list.name || "Unnamed List"}</td>
            <td class="edit-column ${editMode ? "" : "hidden"}">
              <button class="remove-btn" onclick="deleteList('${list.id}')">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          `;
          tr.addEventListener("click", (e) => {
            if (e.target.closest(".remove-btn")) return;
            window.location.href = `display-list.html?id=${list.id}`;
          });
          listsTableBody.appendChild(tr);
        });

        document.querySelectorAll(".edit-column").forEach((cell) => {
          editMode ? cell.classList.remove("hidden") : cell.classList.add("hidden");
        });
      }

      function deleteList(id) {
        const savedLists = getShoppingLists();
        const updated = savedLists.filter((l) => l.id !== id);
        saveShoppingLists(updated);
        renderLists();
      }

      editButton.addEventListener("click", () => {
        editMode = !editMode;
        editButton.innerHTML = editMode
          ? `<i class="fa-solid fa-check"></i>`
          : `<i class="fas fa-pen"></i>`;
        renderLists();
      });

      document.getElementById("add-button").addEventListener("click", openModal);
      searchInput.addEventListener("input", renderLists);

      renderLists();
    </script>
  </body>
</html>
