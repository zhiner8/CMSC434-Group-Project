<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Lists</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />
    <script src="../storage.js"></script>
    <style>
      .tag-cell {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .tag-pill {
        padding: 2px 10px;
        background: var(--accent-blue-2);
        color: var(--off-white);
        border-radius: 999px;
        font-size: 22px;
        white-space: nowrap;
      }
      .preview-cell {
        color: #999;
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Shopping Lists</h1>
        </div>

        <div id="inventory-container">
          <div id="inventory-toolbar">
            <div id="search-wrapper">
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"
                />
              </svg>
              <input
                type="text"
                id="search-input"
                placeholder="Search lists..."
              />
            </div>
            <div id="toolbar-buttons">
              <button id="add-button" title="New list">
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M352 128C352 110.3 337.7 96 320 96C302.3 96 288 110.3 288 128L288 288L128 288C110.3 288 96 302.3 96 320C96 337.7 110.3 352 128 352L288 352L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 352L512 352C529.7 352 544 337.7 544 320C544 302.3 529.7 288 512 288L352 288L352 128z"
                  />
                </svg>
              </button>
              <!-- Recipe shopping shortcut -->
              <button
                id="recipe-shop-button"
                title="Shop from recipes"
                onclick="window.location.href='recipe-shopping.html'"
              >
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"
                  />
                </svg>
              </button>
              <button id="edit-button" title="Edit lists">
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M416.9 85.2L372 130.1L509.9 268L554.8 223.1C568.4 209.6 576 191.2 576 172C576 152.8 568.4 134.4 554.8 120.9L519.1 85.2C505.6 71.6 487.2 64 468 64C448.8 64 430.4 71.6 416.9 85.2zM338.1 164L122.9 379.1C112.2 389.8 104.4 403.2 100.3 417.8L64.9 545.6C62.6 553.9 64.9 562.9 71.1 569C77.3 575.1 86.2 577.5 94.5 575.2L222.3 539.7C236.9 535.6 250.2 527.9 261 517.1L476 301.9L338.1 164z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div id="inventory-table-wrapper">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Tags</th>
                  <th>Items</th>
                  <th class="edit-column hidden">Action</th>
                </tr>
              </thead>
              <tbody id="lists-table-body"></tbody>
            </table>
          </div>
        </div>

        <div id="modal-overlay">
          <div id="new-list-modal">
            <h3>New List</h3>

            <label>Name</label>
            <input
              type="text"
              id="list-name-input"
              placeholder="e.g. Weekly Groceries"
            />

            <label>Description</label>
            <input
              type="text"
              id="list-description-input"
              placeholder="e.g. Everything for the week's meals"
            />

            <label
              >Tags
              <span style="font-weight: 400; font-size: 14px"
                >(comma separated)</span
              ></label
            >
            <input
              type="text"
              id="list-tags-input"
              placeholder="e.g. Weekly, Produce, Meals"
            />

            <label>Items</label>
            <ul id="item-list"></ul>
            <div id="item-input-row">
              <input type="text" id="item-input" placeholder="e.g. bananas" />
              <input type="text" id="item-amount-input" placeholder="Amt." />
              <button id="add-item-btn">Add</button>
            </div>

            <div id="modal-buttons">
              <button id="btn-cancel">Cancel</button>
              <button id="btn-starter" onclick="goToStarterList()">
                Starter Lists
              </button>
              <button id="btn-save">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"
              />
            </svg>
          </a>
          <a href="recipe-book.html" class="nav-buttons">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"
              />
            </svg>
          </a>
          <a href="shopping.html" class="nav-buttons" id="selected">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M112 208C138.5 208 160 186.5 160 160C160 133.5 138.5 112 112 112C85.5 112 64 133.5 64 160C64 186.5 85.5 208 112 208zM256 128C238.3 128 224 142.3 224 160C224 177.7 238.3 192 256 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L256 128zM256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L256 288zM256 448C238.3 448 224 462.3 224 480C224 497.7 238.3 512 256 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L256 448zM112 528C138.5 528 160 506.5 160 480C160 453.5 138.5 432 112 432C85.5 432 64 453.5 64 480C64 506.5 85.5 528 112 528zM160 320C160 293.5 138.5 272 112 272C85.5 272 64 293.5 64 320C64 346.5 85.5 368 112 368C138.5 368 160 346.5 160 320z"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const listsTableBody = document.getElementById("lists-table-body");
      const searchInput = document.getElementById("search-input");
      const editButton = document.getElementById("edit-button");
      const modalOverlay = document.getElementById("modal-overlay");
      const listNameInput = document.getElementById("list-name-input");
      const listDescriptionInput = document.getElementById(
        "list-description-input"
      );
      const listTagsInput = document.getElementById("list-tags-input");
      const itemInput = document.getElementById("item-input");
      const itemAmountInput = document.getElementById("item-amount-input");
      const addItemBtn = document.getElementById("add-item-btn");
      const itemList = document.getElementById("item-list");
      const btnSave = document.getElementById("btn-save");
      const btnCancel = document.getElementById("btn-cancel");

      let editMode = false;
      let draftItems = [];

      function openModal() {
        listNameInput.value = "";
        listDescriptionInput.value = "";
        listTagsInput.value = "";
        itemInput.value = "";
        itemAmountInput.value = "";
        draftItems = [];
        renderItemList();
        modalOverlay.classList.add("open");
      }

      function openModalPrefilled(name, description, tags, items) {
        listNameInput.value = name || "";
        listDescriptionInput.value = description || "";
        listTagsInput.value = tags || "";
        itemInput.value = "";
        itemAmountInput.value = "";
        draftItems = items.map(
          (i) =>
            new Ingredient(
              "i-" + Date.now() + "-" + Math.random().toString(36).slice(2),
              i.name,
              "",
              null,
              "Pantry",
              i.quantity || 1
            )
        );
        renderItemList();
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
        // Clean prefill params from URL so refresh doesn't reopen
        const url = new URL(window.location.href);
        if (url.searchParams.has("prefillName")) {
          url.search = "";
          window.history.replaceState({}, "", url.toString());
        }
      }

      function goToStarterList() {
        closeModal();
        window.location.href = "starter-lists.html";
      }

      function renderItemList() {
        itemList.innerHTML = "";
        draftItems.forEach((item, index) => {
          const li = document.createElement("li");
          const qty =
            item.quantity && item.quantity !== 1 ? ` (${item.quantity})` : "";
          li.innerHTML = `
            <span>${item.name}${qty}</span>
            <button onclick="removeDraftItem(${index})">✕</button>
          `;
          itemList.appendChild(li);
        });
      }

      function addDraftItem() {
        const name = itemInput.value.trim();
        if (!name) return;
        const amount = itemAmountInput.value.trim();
        draftItems.push(
          new Ingredient(
            "i-" + Date.now(),
            name,
            "",
            null,
            "Pantry",
            amount || 1
          )
        );
        itemInput.value = "";
        itemAmountInput.value = "";
        renderItemList();
      }

      function removeDraftItem(index) {
        draftItems.splice(index, 1);
        renderItemList();
      }

      function saveList() {
        const name = listNameInput.value.trim();
        if (!name) {
          alert("Please enter a list name.");
          return;
        }
        if (draftItems.length === 0) {
          alert("Please add at least one item.");
          return;
        }
        const newList = new ShoppingList(
          "l-" + Date.now(),
          name,
          listDescriptionInput.value.trim(),
          listTagsInput.value.trim(),
          new Date().toISOString(),
          draftItems,
          false
        );
        addShoppingList(newList);
        closeModal();
        renderLists();
      }

      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) closeModal();
      });

      btnCancel.addEventListener("click", closeModal);
      btnSave.addEventListener("click", saveList);
      addItemBtn.addEventListener("click", addDraftItem);
      itemInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addDraftItem();
      });
      itemAmountInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addDraftItem();
      });

      function renderLists() {
        const savedLists = getShoppingLists();
        const query = searchInput.value.toLowerCase().trim();
        listsTableBody.innerHTML = "";

        const filtered = savedLists.filter((l) =>
          (l.name || "").toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
          listsTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:gray;">No lists found.</td></tr>`;
          return;
        }

        filtered.forEach((list) => {
          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          const tagHTML = list.tags
            ? list.tags
                .split(",")
                .map((t) => `<span class="tag-pill">${t.trim()}</span>`)
                .join("")
            : "—";

          const itemPreview =
            list.ingredientList && list.ingredientList.length > 0
              ? list.ingredientList
                  .slice(0, 2)
                  .map((i) => (typeof i === "object" ? i.name : i))
                  .join(", ") + (list.ingredientList.length > 2 ? "…" : "")
              : "No items";

          tr.innerHTML = `
            <td>${list.name || "Unnamed List"}</td>
            <td><div class="tag-cell">${tagHTML}</div></td>
            <td class="preview-cell">${itemPreview}</td>
            <td class="edit-column ${editMode ? "" : "hidden"}">
              <button class="remove-btn" onclick="deleteList('${list.id}')">
                <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                  <path d="M232.7 69.9C237.1 56.8 249.3 48 263.1 48L377 48C390.8 48 403 56.8 407.4 69.9L416 96L512 96C529.7 96 544 110.3 544 128C544 145.7 529.7 160 512 160L128 160C110.3 160 96 145.7 96 128C96 110.3 110.3 96 128 96L224 96L232.7 69.9zM128 208L512 208L512 512C512 547.3 483.3 576 448 576L192 576C156.7 576 128 547.3 128 512L128 208z"/>
                </svg>
              </button>
            </td>
          `;
          tr.addEventListener("click", (e) => {
            if (e.target.closest(".remove-btn")) return;
            window.location.href = `display-list.html?id=${list.id}`;
          });
          listsTableBody.appendChild(tr);
        });

        document.querySelectorAll(".edit-column").forEach((cell) => {
          editMode
            ? cell.classList.remove("hidden")
            : cell.classList.add("hidden");
        });
      }

      function deleteList(id) {
        const savedLists = getShoppingLists();
        const updated = savedLists.filter((l) => l.id !== id);
        saveShoppingLists(updated);
        renderLists();
      }

      editButton.addEventListener("click", () => {
        editMode = !editMode;
        editButton.innerHTML = editMode
          ? `<svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M530.8 134.1C545.1 144.5 548.3 164.5 537.9 178.8L281.9 530.8C276.4 538.4 267.9 543.1 258.5 543.9C249.1 544.7 240 541.2 233.4 534.6L105.4 406.6C92.9 394.1 92.9 373.8 105.4 361.3C117.9 348.8 138.2 348.8 150.7 361.3L252.2 462.8L486.2 141.1C496.6 126.8 516.6 123.6 530.9 134z"/>
             </svg>`
          : `<svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M416.9 85.2L372 130.1L509.9 268L554.8 223.1C568.4 209.6 576 191.2 576 172C576 152.8 568.4 134.4 554.8 120.9L519.1 85.2C505.6 71.6 487.2 64 468 64C448.8 64 430.4 71.6 416.9 85.2zM338.1 164L122.9 379.1C112.2 389.8 104.4 403.2 100.3 417.8L64.9 545.6C62.6 553.9 64.9 562.9 71.1 569C77.3 575.1 86.2 577.5 94.5 575.2L222.3 539.7C236.9 535.6 250.2 527.9 261 517.1L476 301.9L338.1 164z"/>
             </svg>`;
        renderLists();
      });

      document
        .getElementById("add-button")
        .addEventListener("click", openModal);
      searchInput.addEventListener("input", renderLists);

      renderLists();

      // ── Check for prefill params (from starter-lists or recipe-shopping) ──
      (function checkPrefill() {
        const params = new URLSearchParams(window.location.search);
        if (!params.has("prefillName")) return;

        const name = params.get("prefillName") || "";
        const description = params.get("prefillDescription") || "";
        const tags = params.get("prefillTags") || "";
        let items = [];
        try {
          items = JSON.parse(params.get("prefillItems") || "[]");
        } catch (e) {
          items = [];
        }

        openModalPrefilled(name, description, tags, items);
      })();
    </script>
  </body>
</html>
