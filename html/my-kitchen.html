<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />

    <script src="../storage.js"></script>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Inventory</h1>
        </div>
        <!-- entire container div -->
        <div id="inventory-container">
          <!-- tool bar like search and edit and add -->
          <div id="inventory-toolbar">
            <!-- all search stuff for search bar -->
            <div id="search-wrapper">
              <!-- svg search magnifying glass -->
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"
                />
              </svg>
              <input
                type="text"
                id="search-input"
                placeholder="Search items..."
              />
            </div>
            <!-- for the dropdown of where the items r stored  -->
            <select id="location-filter">
              <option value="All">Locations: All</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>

            <!-- only the add button now (pencil/edit-mode toggle removed per redesign) -->
            <div id="toolbar-buttons">
              <!-- SVGS for add -->

              <button id="add-button" aria-label="Add item">
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M352 128C352 110.3 337.7 96 320 96C302.3 96 288 110.3 288 128L288 288L128 288C110.3 288 96 302.3 96 320C96 337.7 110.3 352 128 352L288 352L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 352L512 352C529.7 352 544 337.7 544 320C544 302.3 529.7 288 512 288L352 288L352 128z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- inventory table with all 5 columns -->
          <div id="inventory-table-wrapper">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Description</th>
                  <th>Use By</th>
                  <th>Quantity</th>
                  <th>Location</th>
                </tr>
              </thead>
              <tbody id="inventory-body"></tbody>
            </table>
          </div>
        </div>

        <!-- replaces old modal -->
        <div id="modal-overlay-item">
          <div id="item-detail-modal">
            <div id="item-detail-header">
              <button id="item-back-btn" aria-label="Back">
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M249.4 169.4C261.9 156.9 282.2 156.9 294.7 169.4C307.2 181.9 307.2 202.2 294.7 214.7L221.3 288L544 288C561.7 288 576 302.3 576 320C576 337.7 561.7 352 544 352L221.3 352L294.6 425.4C307.1 437.9 307.1 458.2 294.6 470.7C282.1 483.2 261.8 483.2 249.3 470.7L121.3 342.7C108.8 330.2 108.8 309.9 121.3 297.4L249.3 169.4z"
                  />
                </svg>
              </button>
              <h3 id="item-detail-title">Item</h3>
              <div id="item-detail-actions">
                <button id="item-edit-btn" aria-label="Edit">
                  <svg
                    class="icon"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 640"
                  >
                    <path
                      d="M416.9 85.2L372 130.1L509.9 268L554.8 223.1C568.4 209.6 576 191.2 576 172C576 152.8 568.4 134.4 554.8 120.9L519.1 85.2C505.6 71.6 487.2 64 468 64C448.8 64 430.4 71.6 416.9 85.2zM338.1 164L122.9 379.1C112.2 389.8 104.4 403.2 100.3 417.8L64.9 545.6C62.6 553.9 64.9 562.9 71.1 569C77.3 575.1 86.2 577.5 94.5 575.2L222.3 539.7C236.9 535.6 250.2 527.9 261 517.1L476 301.9L338.1 164z"
                    />
                  </svg>
                </button>
                <button id="item-delete-btn" aria-label="Delete">
                  <svg
                    class="icon"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 640"
                  >
                    <path
                      d="M232.7 69.9C237.1 56.8 249.3 48 263.1 48L377 48C390.8 48 403 56.8 407.4 69.9L416 96L512 96C529.7 96 544 110.3 544 128C544 145.7 529.7 160 512 160L128 160C110.3 160 96 145.7 96 128C96 110.3 110.3 96 128 96L224 96L232.7 69.9zM128 208L512 208L512 512C512 547.3 483.3 576 448 576L192 576C156.7 576 128 547.3 128 512L128 208zM216 272C202.7 272 192 282.7 192 296L192 488C192 501.3 202.7 512 216 512C229.3 512 240 501.3 240 488L240 296C240 282.7 229.3 272 216 272zM320 272C306.7 272 296 282.7 296 296L296 488C296 501.3 306.7 512 320 512C333.3 512 344 501.3 344 488L344 296C344 282.7 333.3 272 320 272zM424 272C410.7 272 400 282.7 400 296L400 488C400 501.3 410.7 512 424 512C437.3 512 448 501.3 448 488L448 296C448 282.7 437.3 272 424 272z"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <div id="item-detail-body">
              <div class="detail-row">
                <label>Name</label>
                <span class="detail-value" id="detail-name"></span>
                <input type="text" class="detail-input" id="edit-name" />
              </div>
              <div class="detail-row">
                <label>Description</label>
                <span class="detail-value" id="detail-description"></span>
                <input type="text" class="detail-input" id="edit-description" />
              </div>

              <div class="detail-row">
                <label>Use By</label>
                <span class="detail-value" id="detail-useBy"></span>
                <input type="date" class="detail-input" id="edit-useBy" />
              </div>

              <div class="detail-row">
                <label>Quantity</label>
                <span class="detail-value" id="detail-quantity"></span>
                <div class="detail-input quantity-edit-row">
                  <input type="number" id="edit-quantity" min="0" step="any" />
                  <select id="edit-unit">
                    <option value="">—</option>
                    <option value="pcs">pcs</option>
                    <option value="g">g</option>
                    <option value="kg">kg</option>
                    <option value="oz">oz</option>
                    <option value="lb">lb</option>
                    <option value="ml">ml</option>
                    <option value="L">L</option>
                    <option value="cup">cup</option>
                    <option value="tbsp">tbsp</option>
                    <option value="tsp">tsp</option>
                  </select>
                </div>
              </div>

              <div class="detail-row">
                <label>Location</label>
                <span class="detail-value" id="detail-location"></span>
                <select class="detail-input" id="edit-location">
                  <option value="Fridge">Fridge</option>
                  <option value="Pantry">Pantry</option>
                  <option value="Freezer">Freezer</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div id="item-detail-footer">
              <button id="item-save-btn">Save</button>
            </div>
          </div>
        </div>

        <!-- add new modal kept, with unit added now -->
        <div id="modal-overlay">
          <div id="inventory-modal">
            <h3>New Item</h3>

            <label for="inventory-name-input">Name*</label>
            <input
              type="text"
              id="inventory-name-input"
              placeholder="e.g. Lettuce"
            />
            <label for="inventory-description-input">Description</label>
            <input
              type="text"
              id="inventory-description-input"
              placeholder="..."
            />

            <label for="inventory-useBy-input">Use-By</label>
            <input type="date" id="inventory-useBy-input" />

            <label>Quantity</label>
            <div class="quantity-edit-row">
              <input
                type="number"
                id="inventory-quantity-input"
                min="0"
                step="any"
                placeholder="0"
              />
              <select id="inventory-unit-input">
                <option value="">—</option>
                <option value="pcs">pcs</option>
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="oz">oz</option>
                <option value="lb">lb</option>
                <option value="ml">ml</option>
                <option value="L">L</option>
                <option value="cup">cup</option>
                <option value="tbsp">tbsp</option>
                <option value="tsp">tsp</option>
              </select>
            </div>

            <label for="inventory-location-input">Location*</label>
            <select id="inventory-location-input">
              <option value="">Select a location</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-item-btn">Save</button>
            </div>
          </div>
        </div>
      </div>

      <!-- nav bar  -->
      <div id="nav-bar">
        <a href="my-kitchen.html" class="nav-buttons" id="selected">
          <!-- NAV ICONS FROM FONTAWESOME SVGS -->
          <svg
            class="icon"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 640"
          >
            <path
              d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"
            />
          </svg>
        </a>
        <a href="recipe-book.html" class="nav-buttons">
          <svg
            class="icon"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 640"
          >
            <path
              d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"
            />
          </svg>
        </a>
        <a href="shopping.html" class="nav-buttons">
          <svg
            class="icon"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 640"
          >
            <path
              d="M112 208C138.5 208 160 186.5 160 160C160 133.5 138.5 112 112 112C85.5 112 64 133.5 64 160C64 186.5 85.5 208 112 208zM256 128C238.3 128 224 142.3 224 160C224 177.7 238.3 192 256 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L256 128zM256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L256 288zM256 448C238.3 448 224 462.3 224 480C224 497.7 238.3 512 256 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L256 448zM112 528C138.5 528 160 506.5 160 480C160 453.5 138.5 432 112 432C85.5 432 64 453.5 64 480C64 506.5 85.5 528 112 528zM160 320C160 293.5 138.5 272 112 272C85.5 272 64 293.5 64 320C64 346.5 85.5 368 112 368C138.5 368 160 346.5 160 320z"
            />
          </svg>
        </a>
      </div>
    </div>

    <script>
      // https://www.w3schools.com/jsref/jsref_obj_array.asp gave fucntions used with all the array manipulation
      // storage from storage.js (used to be app.js make sure to fix)
      initStorage();

      const inventoryBody = document.getElementById("inventory-body");
      const searchInput = document.getElementById("search-input");
      const locationFilter = document.getElementById("location-filter");
      const addButton = document.getElementById("add-button");

      const modalOverlay = document.getElementById("modal-overlay");
      const inventoryNameInput = document.getElementById(
        "inventory-name-input"
      );
      const inventoryLocationInput = document.getElementById(
        "inventory-location-input"
      );
      const inventoryDescriptionInput = document.getElementById(
        "inventory-description-input"
      );
      const inventoryUseByInput = document.getElementById(
        "inventory-useBy-input"
      );
      const inventoryQuantityInput = document.getElementById(
        "inventory-quantity-input"
      );
      const inventoryUnitInput = document.getElementById(
        "inventory-unit-input"
      );
      const cancelBtn = document.getElementById("cancel-btn");
      const saveItemBtn = document.getElementById("save-item-btn");
      // function getTodayDate() {
      //   const today = new Date();
      //
      //   return `${mm}/${dd}/${yy}`;
      // }
      // we are using UseBy instead of getTodays Date now

      //rebuilds inevntoru table based on current search and location filters :]

      const modalOverlayItem = document.getElementById("modal-overlay-item");
      const itemDetailTitle = document.getElementById("item-detail-title");
      const itemBackBtn = document.getElementById("item-back-btn");
      const itemEditBtn = document.getElementById("item-edit-btn");
      const itemDeleteBtn = document.getElementById("item-delete-btn");
      const itemSaveBtn = document.getElementById("item-save-btn");

      const detailName = document.getElementById("detail-name");
      const detailDescription = document.getElementById("detail-description");
      const detailUseBy = document.getElementById("detail-useBy");
      const detailQuantity = document.getElementById("detail-quantity");
      const detailLocation = document.getElementById("detail-location");

      const editName = document.getElementById("edit-name");
      const editDescription = document.getElementById("edit-description");
      const editUseBy = document.getElementById("edit-useBy");
      const editQuantity = document.getElementById("edit-quantity");
      const editUnit = document.getElementById("edit-unit");
      const editLocation = document.getElementById("edit-location");

      let selectedItemId = null;
      let detailEditMode = false;

      function formatDate(dateValue) {
        if (!dateValue) return "--";
        const date = new Date(dateValue);
        if (isNaN(date)) return "--";
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        const yy = String(date.getFullYear()).slice(-2);
        return `${mm}/${dd}/${yy}`;
      }

      function formatQuantity(qty, unit) {
        if (qty === null || qty === undefined || qty === "") return "--";
        return unit ? `${qty} ${unit}` : `${qty}`;
      }

      function updateInventoryItemLocal(id, changes) {
        const inventory = getInventory().map((i) =>
          i.id === id ? { ...i, ...changes } : i
        );
        saveInventory(inventory);
      }

      function renderInventory() {
        inventoryBody.innerHTML = "";

        const searchValue = searchInput.value.toLowerCase().trim();
        const selectedLocation = locationFilter.value;
        const inventory = getInventory();

        const filteredItems = inventory.filter((item) => {
          const matchesSearch = item.name.toLowerCase().includes(searchValue);
          const matchesLocation =
            selectedLocation === "All" || item.location === selectedLocation;
          return matchesSearch && matchesLocation;
        });

        if (filteredItems.length === 0) {
          const row = document.createElement("tr");
          row.innerHTML = `<td colspan="5" class="empty-row">No items found.</td>`;
          inventoryBody.appendChild(row);
          return;
        }

        filteredItems.forEach((item) => {
          const row = document.createElement("tr");
          row.style.cursor = "pointer";
          row.addEventListener("click", () => openItemDetailModal(item.id));

          row.innerHTML = `
            <td class="cell-name">${item.name}</td>
            <td class="cell-desc">${item.description || "--"}</td>
            <td>${formatDate(item.useBy)}</td>
            <td>${formatQuantity(item.quantity, item.unit)}</td>
            <td>${item.location || "--"}</td>
          `;
          inventoryBody.appendChild(row);
        });
      }

      // add new item modal
      function openModal() {
        inventoryNameInput.value = "";
        inventoryDescriptionInput.value = "";
        inventoryUseByInput.value = "";
        inventoryQuantityInput.value = "";
        inventoryUnitInput.value = "";
        inventoryLocationInput.value = "";
        modalOverlay.classList.add("open");
        inventoryNameInput.focus();
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function saveInventoryItem() {
        const id = "i" + Date.now();
        const name = inventoryNameInput.value.trim();
        const location = inventoryLocationInput.value;
        const description = inventoryDescriptionInput.value.trim();
        const useBy = inventoryUseByInput.value;
        const quantityRaw = inventoryQuantityInput.value;
        const quantity = quantityRaw === "" ? 0 : Number(quantityRaw);
        const unit = inventoryUnitInput.value;

        if (!name) {
          alert("Please enter an item name.");
          return;
        }
        if (!location) {
          alert("Please select a location.");
          return;
        }

        const item = new Ingredient(
          id,
          name,
          description,
          useBy,
          location,
          quantity
        );
        // unit isn't part of the Ingredient constructor — attach it as an extra prop
        item.unit = unit;

        addInventoryItem(item);
        closeModal();
        renderInventory();
      }

      function openItemDetailModal(id) {
        const item = getInventory().find((i) => i.id === id);
        if (!item) return;

        selectedItemId = id;
        detailEditMode = false;

        // populate read only spans
        itemDetailTitle.textContent = item.name;
        detailName.textContent = item.name;
        detailDescription.textContent = item.description || "--";
        detailUseBy.textContent = formatDate(item.useBy);
        detailQuantity.textContent = formatQuantity(item.quantity, item.unit);
        detailLocation.textContent = item.location || "--";

        // preffill edit inputs (so they're ready when user clicks edit)
        editName.value = item.name || "";
        editDescription.value = item.description || "";
        editUseBy.value = item.useBy || "";
        editQuantity.value =
          item.quantity === null || item.quantity === undefined
            ? ""
            : item.quantity;
        editUnit.value = item.unit || "";
        editLocation.value = item.location || "Pantry";

        applyDetailMode();
        modalOverlayItem.classList.add("open");
      }

      function closeItemDetailModal() {
        modalOverlayItem.classList.remove("open");
        selectedItemId = null;
        detailEditMode = false;
      }

      // toggles between view and edit modes
      function applyDetailMode() {
        const modal = document.getElementById("item-detail-modal");
        if (detailEditMode) {
          modal.classList.add("editing");
        } else {
          modal.classList.remove("editing");
        }
      }

      function toggleEditMode() {
        detailEditMode = !detailEditMode;
        applyDetailMode();
        if (detailEditMode) editName.focus();
      }

      function saveDetailEdits() {
        if (!selectedItemId) return;

        const name = editName.value.trim();
        if (!name) {
          alert("Name can't be empty.");
          return;
        }
        const location = editLocation.value;
        if (!location) {
          alert("Please select a location.");
          return;
        }

        const quantityRaw = editQuantity.value;
        const quantity = quantityRaw === "" ? 0 : Number(quantityRaw);

        updateInventoryItemLocal(selectedItemId, {
          name,
          description: editDescription.value.trim(),
          useBy: editUseBy.value || null,
          quantity,
          unit: editUnit.value,
          location,
        });

        // refresh displayed values, exit edit mode, rerender table
        const updated = getInventory().find((i) => i.id === selectedItemId);
        if (updated) {
          itemDetailTitle.textContent = updated.name;
          detailName.textContent = updated.name;
          detailDescription.textContent = updated.description || "--";
          detailUseBy.textContent = formatDate(updated.useBy);
          detailQuantity.textContent = formatQuantity(
            updated.quantity,
            updated.unit
          );
          detailLocation.textContent = updated.location || "--";
        }

        detailEditMode = false;
        applyDetailMode();
        renderInventory();
      }

      function deleteCurrentItem() {
        if (!selectedItemId) return;
        const item = getInventory().find((i) => i.id === selectedItemId);
        const confirmName = item ? item.name : "this item";
        if (!confirm(`Delete "${confirmName}"? This can't be undone.`)) return;

        removeInventoryItem(selectedItemId);
        closeItemDetailModal();
        renderInventory();
      }

      addButton.addEventListener("click", openModal);
      cancelBtn.addEventListener("click", closeModal);
      saveItemBtn.addEventListener("click", saveInventoryItem);

      itemBackBtn.addEventListener("click", closeItemDetailModal);
      itemEditBtn.addEventListener("click", toggleEditMode);
      itemDeleteBtn.addEventListener("click", deleteCurrentItem);
      itemSaveBtn.addEventListener("click", saveDetailEdits);

      searchInput.addEventListener("input", renderInventory);
      locationFilter.addEventListener("change", renderInventory);

      inventoryNameInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") saveInventoryItem();
      });

      // close modals on overlay click (not on inner-modal click)
      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) closeModal();
      });
      modalOverlayItem.addEventListener("click", (e) => {
        if (e.target === modalOverlayItem) closeItemDetailModal();
      });

      renderInventory();
    </script>
  </body>
</html>
