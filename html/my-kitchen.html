<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kitchen</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/75ab6db391.js"
      crossorigin="anonymous"
    ></script>
    <script src="../App.js"></script>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>My Kitchen</h1>
        </div>

        <div id="inventory-container">
          <div id="inventory-toolbar">
            <div id="search-wrapper">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="text"
                id="search-input"
                placeholder="Search items..."
              />
            </div>

            <select id="location-filter">
              <option value="All">Locations: All</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>

            <div id="toolbar-buttons">
              <button id="edit-button">Edit</button>
              <button id="add-button">Add</button>
            </div>
          </div>

          <div id="inventory-table-wrapper">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Location</th>
                  <th>Added</th>
                  <th class="edit-column hidden">Action</th>
                </tr>
              </thead>
              <tbody id="inventory-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="nav-bar">
        <a href="my-kitchen.html" class="nav-buttons" id="selected"
          >My Kitchen</a
        >
        <a href="recipe-book.html" class="nav-buttons">Recipe Book</a>
        <a href="shopping.html" class="nav-buttons">Shopping Lists</a>
      </div>
    </div>

    <script>
      const inventoryBody = document.getElementById("inventory-body");
      const searchInput = document.getElementById("search-input");
      const locationFilter = document.getElementById("location-filter");
      const editButton = document.getElementById("edit-button");
      const addButton = document.getElementById("add-button");

      let editMode = false;

      function getTodayDate() {
        const today = new Date();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        const yy = String(today.getFullYear()).slice(-2);
        return `${mm}/${dd}/${yy}`;
      }

      function renderInventory() {
        inventoryBody.innerHTML = "";

        const searchValue = searchInput.value.toLowerCase().trim();
        const selectedLocation = locationFilter.value;

        const filteredItems = inventory.filter((item) => {
          const matchesSearch = item.name.toLowerCase().includes(searchValue);
          const matchesLocation =
            selectedLocation === "All" || item.location === selectedLocation;

          return matchesSearch && matchesLocation;
        });

        filteredItems.forEach((item) => {
          const originalIndex = inventory.indexOf(item);
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.location}</td>
            <td>${item.dateAdded || "--"}</td>
            <td class="edit-column ${editMode ? "" : "hidden"}">
              <button class="remove-btn" onclick="removeInventoryItem(${originalIndex})">
                Remove
              </button>
            </td>
          `;

          inventoryBody.appendChild(row);
        });

        document.querySelectorAll(".edit-column").forEach((cell) => {
          if (editMode) {
            cell.classList.remove("hidden");
          } else {
            cell.classList.add("hidden");
          }
        });
      }

      function addInventoryItem() {
        const itemName = prompt("Enter item name:");
        if (!itemName || !itemName.trim()) return;

        const location = prompt(
          "Enter location: Fridge, Pantry, Freezer, or Other"
        );
        if (!location || !location.trim()) return;

        inventory.push({
          name: itemName.trim(),
          location: location.trim(),
          dateAdded: getTodayDate(),
        });

        renderInventory();
      }

      function removeInventoryItem(index) {
        inventory.splice(index, 1);
        renderInventory();
      }

      editButton.addEventListener("click", () => {
        editMode = !editMode;
        editButton.textContent = editMode ? "Done" : "Edit";
        renderInventory();
      });

      addButton.addEventListener("click", addInventoryItem);
      searchInput.addEventListener("input", renderInventory);
      locationFilter.addEventListener("change", renderInventory);

      renderInventory();
    </script>
  </body>
</html>
