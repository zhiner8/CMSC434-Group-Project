<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kitchen</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/75ab6db391.js"
      crossorigin="anonymous"
    ></script>
    <script src="../storage.js"></script>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>My Kitchen</h1>
        </div>
        <!-- entire container div -->
        <div id="inventory-container">
          <!-- tool bar like search and edit and add -->
          <div id="inventory-toolbar">
            <!-- all search stuff for search bar -->
            <div id="search-wrapper">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="text"
                id="search-input"
                placeholder="Search items..."
              />
            </div>
            <!-- for the dropdown of where the items r stored  -->
            <select id="location-filter">
              <option value="All">Locations: All</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>
            <!-- edit and add buttons next to dropdown -->
            <div id="toolbar-buttons">
              <button id="add-button"><i class="fas fa-plus"></i></button>
              <button id="edit-button"><i class="fas fa-pen"></i></button>
            </div>
          </div>
          <!-- where table starts -->
          <div id="inventory-table-wrapper">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Location</th>
                  <th>Use By</th>
                  <th class="edit-column hidden">Action</th>
                </tr>
              </thead>
              <tbody id="inventory-body"></tbody>
            </table>
          </div>
        </div>

        <!-- modal -->
        <div id="modal-overlay">
          <div id="inventory-modal">
            <h3>New Item</h3>

            <label for="inventory-name-input">Name*</label>
            <input
              type="text"
              id="inventory-name-input"
              placeholder="e.g. Lettuce"
            />
            <label for="inventory-description-input">Description</label>
            <input
              type="text"
              id="inventory-description-input"
              placeholder="..."
            />

            <label for="inventory-useBy-input">Use-By</label>
            <input type="date" id="inventory-useBy-input" placeholder="..." />

            <label for="inventory-quantity-input">Quantity</label>
            <input type="number" id="inventory-quantity-input" />

            <label for="inventory-location-input">Location*</label>
            <select id="inventory-location-input">
              <option value="">Select a location</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-item-btn">Save</button>
            </div>
          </div>
        </div>
      </div>

      <div id="modal-overlay-info">
        <div id="info-modal">
          <h3>Item</h3>
          <div class="modal-buttons">
            <button id="close-btn">Close</button>
          </div>
        </div>
      </div>

      <!-- nav bar  -->
      <div id="nav-bar">
        <a href="my-kitchen.html" class="nav-buttons" id="selected"
          ><i class="fas fa-home"></i
        ></a>
        <a href="recipe-book.html" class="nav-buttons"
          ><i class="fas fa-book"></i
        ></a>
        <a href="shopping.html" class="nav-buttons"
          ><i class="fas fa-list-ul"></i
        ></a>
      </div>
    </div>

    <script>
      initStorage();
      const inventoryBody = document.getElementById("inventory-body");
      const searchInput = document.getElementById("search-input");
      const locationFilter = document.getElementById("location-filter");
      const editButton = document.getElementById("edit-button");
      const addButton = document.getElementById("add-button");

      // Info Modal Overlay

      const modalOverlayInfo = document.getElementById("modal-overlay-info");
      const closeButton = document.getElementById("close-btn");

      // Add Item Modal Overlay
      const modalOverlay = document.getElementById("modal-overlay");
      const inventoryNameInput = document.getElementById(
        "inventory-name-input"
      );
      const inventoryLocationInput = document.getElementById(
        "inventory-location-input"
      );
      const inventoryDescriptionInput = document.getElementById(
        "inventory-location-input"
      );
      const inventoryUseByInput = document.getElementById(
        "inventory-useBy-input"
      );
      const inventoryQuantityInput = document.getElementById(
        "inventory-quantity-input"
      );
      const cancelBtn = document.getElementById("cancel-btn");
      const saveItemBtn = document.getElementById("save-item-btn");

      let editMode = false;

      function getTodayDate() {
        const today = new Date();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        const yy = String(today.getFullYear()).slice(-2);
        return `${mm}/${dd}/${yy}`;
      }

      function renderInventory() {
        inventoryBody.innerHTML = "";

        const searchValue = searchInput.value.toLowerCase().trim();
        const selectedLocation = locationFilter.value;

        let inventory = getInventory();

        const filteredItems = inventory.filter((item) => {
          const matchesSearch = item.name.toLowerCase().includes(searchValue);
          const matchesLocation =
            selectedLocation === "All" || item.location === selectedLocation;

          return matchesSearch && matchesLocation;
        });

        filteredItems.forEach((item) => {
          const originalIndex = inventory.indexOf(item);
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>
              <button id="info-btn" onclick="openModalInfo()">
               <i class="fas fa-info-circle"></i>
              </button> 
               ${item.name} </td>
            <td>${item.location}</td>
            <td>${formatDate(item.useBy)}</td>
            <td class="edit-column ${editMode ? "" : "hidden"}">
              <button class="remove-btn" onclick="removeItem(${item.id})">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          `;

          inventoryBody.appendChild(row);
        });

        document.querySelectorAll(".edit-column").forEach((cell) => {
          if (editMode) {
            cell.classList.remove("hidden");
          } else {
            cell.classList.add("hidden");
          }
        });
      }
      function formatDate(dateValue) {
        if (!dateValue) return "--";

        const date = new Date(dateValue);

        if (isNaN(date)) return "--";

        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        const yy = String(date.getFullYear()).slice(-2);

        return `${mm}/${dd}/${yy}`;
      }
      function openModal() {
        inventoryNameInput.value = "";
        inventoryLocationInput.value = "";
        modalOverlay.classList.add("open");
        inventoryNameInput.focus();
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function openModalInfo() {
        console.log("openModalInfo called");
        modalOverlayInfo.classList.add("open");
      }

      function closeModalInfo() {
        modalOverlayInfo.classList.remove("open");
      }

      function saveInventoryItem() {
        const id = "i" + Date.now();
        const name = inventoryNameInput.value.trim();
        const location = inventoryLocationInput.value;
        const description = inventoryDescriptionInput.value;
        const useBy = inventoryUseByInput.value;
        const quantity = inventoryQuantityInput.quantity;

        // WHICH FIELDS SHOULD BE ABSOLUTELY REQUIRED?

        if (!name) {
          alert("Please enter an item name.");
          return;
        }

        if (!location) {
          alert("Please select a location.");
          return;
        }

        // need to add
        item = new Ingredient(id, name, description, useBy, location, quantity);
        addInventoryItem(item);

        closeModal();

        // rn if you reload or close the modal and re-open it keeps your input so we need to figure out how to fix that
        renderInventory();
      }

      function removeItem(id) {
        removeInventoryItem(id);
        renderInventory();
      }

      editButton.addEventListener("click", () => {
        editMode = !editMode;
        editButton.innerHTML = editMode ? `<i class="fa-solid fa-check"></i>` : `<i class="fas fa-pen"></i>`;
        renderInventory();
      });

      addButton.addEventListener("click", openModal);
      cancelBtn.addEventListener("click", closeModal);
      saveItemBtn.addEventListener("click", saveInventoryItem);

      closeButton.addEventListener("click", closeModalInfo);

      searchInput.addEventListener("input", renderInventory);
      locationFilter.addEventListener("change", renderInventory);

      inventoryNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") saveInventoryItem();
      });

      inventoryLocationInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") saveInventoryItem();
      });

      renderInventory();
    </script>
  </body>
</html>
