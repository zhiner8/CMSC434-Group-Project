<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../recipe-book.css" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Recipe Book</h1>
        </div>
        <div id="recipe-container">
          <div id="recipe-toolbar">
            <div id="search-wrapper">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="search-input" placeholder="Search items..." />
            </div>
            <select id="sort-select">
              <option value="none">Sort by...</option>
              <option value="name-asc">Name (A–Z)</option>
              <option value="name-desc">Name (Z–A)</option>
              <option value="tag">Tag</option>
            </select>
            <div id="toolbar-buttons">
              <button id="edit-button"><i class="fas fa-pen"></i></button>
              <button id="new-recipe"><i class="fas fa-plus"></i></button>
            </div>
          </div>

          <div id="filter-bar">
            <input type="checkbox" id="available-toggle" />
            <label id="filter-label" for="available-toggle">Show only recipes I can make</label>
          </div>

          <div id="recipe-table-wrapper">
            <div id="recipe-table">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Ingredients</th>
                    <th>Tags</th>
                  </tr>
                </thead>
                <tbody id="recipe-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="modal-overlay">
          <div id="recipe-modal">
            <h3>New Recipe</h3>

            <label>Name</label>
            <input type="text" id="recipe-name-input" placeholder="e.g. Spaghetti Bolognese" />

            <label>Description</label>
            <input type="text" id="recipe-description-input" placeholder="good weeknight dinner" />

            <label>Tags <span style="font-weight:400; font-size:14px;">(comma separated)</span></label>
            <input type="text" id="recipe-tags-input" placeholder="e.g. Italian, Dinner" />

            <label>Ingredients</label>
            <ul id="ingredient-list"></ul>
            <div id="ingredient-input-row">
              <input type="text" id="ingredient-input" placeholder="e.g. tomato sauce" />
              <input type="text" id="ingredient-amount-input" placeholder="Amt." />
              <button id="add-ingredient-btn">Add</button>
            </div>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-recipe-btn">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons"><i class="fas fa-home"></i></a>
          <a href="recipe-book.html" class="nav-buttons" id="selected"><i class="fas fa-book"></i></a>
          <a href="shopping.html" class="nav-buttons"><i class="fas fa-list-ul"></i></a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const recipeTableBody = document.getElementById("recipe-table-body");
      const modalOverlay = document.getElementById("modal-overlay");
      const newRecipeBtn = document.getElementById("new-recipe");
      const cancelBtn = document.getElementById("cancel-btn");
      const saveRecipeBtn = document.getElementById("save-recipe-btn");
      const recipeNameInput = document.getElementById("recipe-name-input");
      const recipeDescriptionInput = document.getElementById("recipe-description-input");
      const recipeTagsInput = document.getElementById("recipe-tags-input");
      const ingredientInput = document.getElementById("ingredient-input");
      const ingredientAmountInput = document.getElementById("ingredient-amount-input");
      const addIngredientBtn = document.getElementById("add-ingredient-btn");
      const ingredientList = document.getElementById("ingredient-list");
      const searchInput = document.getElementById("search-input");
      const sortSelect = document.getElementById("sort-select");
      const availableToggle = document.getElementById("available-toggle");

      let currentIngredients = [];

      function getFilteredAndSorted() {
        let recipes = availableToggle.checked ? getAvailableRecipes() : getRecipes();

        const query = searchInput.value.trim().toLowerCase();
        if (query) {
          recipes = recipes.filter((r) => {
            return r ? r.name.toLowerCase().includes(query) : false;
          });
        }

        const sort = sortSelect.value;
        if (sort === "name-asc") {
          recipes.sort((a, b) => a.name.localeCompare(b.name));
        } else if (sort === "name-desc") {
          recipes.sort((a, b) => b.name.localeCompare(a.name));
        } else if (sort === "tag") {
          recipes.sort((a, b) => {
            const tagA = typeof a.tags === "string" ? a.tags : a.tags.join(", ");
            const tagB = typeof b.tags === "string" ? b.tags : b.tags.join(", ");
            return tagA.localeCompare(tagB);
          });
        }

        return recipes;
      }

      function renderRecipes() {
        const recipes = getFilteredAndSorted();
        recipeTableBody.innerHTML = "";

        if (recipes.length === 0) {
          recipeTableBody.innerHTML = `
            <tr>
              <td colspan="3" style="text-align:center; color:gray;">No recipes found.</td>
            </tr>
          `;
          return;
        }

        recipes.forEach((recipe) => {
          if (recipe) {
            const tr = document.createElement("tr");
            tr.style.cursor = "pointer";
            tr.innerHTML = `
              <td>${recipe.name}</td>
              <td>${recipe.ingredients.reduce((acc, curr) => {
                if (!curr) return acc;
                const qty = curr.quantity && curr.quantity !== 1 ? ` (${curr.quantity})` : "";
                return acc + curr.name + qty + ", ";
              }, "").replace(/, $/, "")}</td>
              <td>${recipe.tags}</td>
            `;
            tr.addEventListener("click", () => {
              window.location.href = `recipe-detail.html?id=${recipe.id}`;
            });
            recipeTableBody.appendChild(tr);
          }
        });
      }

      function openModal() {
        recipeNameInput.value = "";
        recipeDescriptionInput.value = "";
        recipeTagsInput.value = "";
        ingredientInput.value = "";
        ingredientAmountInput.value = "";
        currentIngredients = [];
        renderIngredientList();
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function renderIngredientList() {
        ingredientList.innerHTML = "";
        currentIngredients.forEach((ing, index) => {
          const li = document.createElement("li");
          const qty = ing.quantity && ing.quantity !== 1 ? ` (${ing.quantity})` : "";
          li.innerHTML = `
            <span>${ing.name}${qty}</span>
            <button onclick="removeIngredient(${index})">✕</button>
          `;
          ingredientList.appendChild(li);
        });
      }

      function addIngredient() {
        const name = ingredientInput.value.trim();
        if (!name) return;
        const amount = ingredientAmountInput.value.trim();
        const val = new Ingredient(
          "i-" + Date.now(),
          name,
          "",
          "2026-01-01",
          "pantry",
          amount || 1
        );
        currentIngredients.push(val);
        ingredientInput.value = "";
        ingredientAmountInput.value = "";
        renderIngredientList();
      }

      function removeIngredient(index) {
        currentIngredients.splice(index, 1);
        renderIngredientList();
      }

      function saveRecipe() {
        const name = recipeNameInput.value.trim();
        const description = recipeDescriptionInput.value;
        const tags = recipeTagsInput.value.trim();
        const ingredients = currentIngredients;

        if (!name) {
          alert("Please enter a recipe name.");
          return;
        }
        if (currentIngredients.length === 0) {
          alert("Please add at least one ingredient.");
          return;
        }

        const recipe = new Recipe("r" + Date.now(), name, description, tags, ingredients);
        addRecipe(recipe);
        closeModal();
        renderRecipes();
      }

      newRecipeBtn.addEventListener("click", openModal);
      cancelBtn.addEventListener("click", closeModal);
      saveRecipeBtn.addEventListener("click", saveRecipe);
      addIngredientBtn.addEventListener("click", addIngredient);
      ingredientInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addIngredient();
      });
      ingredientAmountInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addIngredient();
      });
      searchInput.addEventListener("input", renderRecipes);
      sortSelect.addEventListener("change", renderRecipes);
      availableToggle.addEventListener("change", renderRecipes);

      renderRecipes();
    </script>
  </body>
</html>
