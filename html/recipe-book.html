<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../recipe-book.css" />
    <script src="../storage.js"></script>
  </head>

  <body>
    <div id="device">
      <div id="screen">

        <div id="header">
          <h1>Recipe Book</h1>
        </div>

        <div id="recipe-container">

          <!-- Toolbar: search | sort | add (NO edit-mode toggle) -->
          <div id="recipe-toolbar">
            <div id="search-wrapper">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"/>
              </svg>
              <input type="text" id="search-input" placeholder="Search recipes..." />
            </div>

            <select id="sort-select">
              <option value="none">Sort by...</option>
              <option value="name-asc">Name (A–Z)</option>
              <option value="name-desc">Name (Z–A)</option>
              <option value="tag">Tag</option>
            </select>

            <div id="toolbar-buttons">
              <button id="new-recipe" title="Add recipe">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                  <path d="M352 128C352 110.3 337.7 96 320 96C302.3 96 288 110.3 288 128L288 288L128 288C110.3 288 96 302.3 96 320C96 337.7 110.3 352 128 352L288 352L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 352L512 352C529.7 352 544 337.7 544 320C544 302.3 529.7 288 512 288L352 288L352 128z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Filter bar -->
          <div id="filter-bar">
            <input type="checkbox" id="available-toggle" />
            <label id="filter-label" for="available-toggle">Show only recipes I can make</label>
            <select id="tag-filter-select">
              <option value="all">All Tags</option>
            </select>
          </div>

          <!-- Table -->
          <div id="recipe-table-wrapper">
            <table id="recipe-table">
              <thead>
                <tr>
                  <th class="col-name">Name</th>
                  <th class="col-ingredients">Ingredients</th>
                  <th class="col-tags">Tags</th>
                  <th class="col-caret"></th>
                </tr>
              </thead>
              <tbody id="recipe-table-body"></tbody>
            </table>
          </div>
        </div>

        <!-- Add Recipe Modal -->
        <div id="modal-overlay">
          <div id="recipe-modal">
            <h3>New Recipe</h3>
            <div id="modal-error"></div>

            <label>Name</label>
            <input type="text" id="recipe-name-input" placeholder="e.g. Spaghetti Bolognese" />

            <label>Description</label>
            <input type="text" id="recipe-description-input" placeholder="Good weeknight dinner" />

            <label>Tags <span class="label-hint">(comma separated)</span></label>
            <input type="text" id="recipe-tags-input" placeholder="e.g. Italian, Dinner" />

            <label>Ingredients</label>
            <ul id="ingredient-list"></ul>
            <div id="ingredient-input-row">
              <input type="text" id="ingredient-input" placeholder="Ingredient name" />
              <input type="text" id="ingredient-amount-input" placeholder="Qty." />
              <button id="add-ingredient-btn">Add</button>
            </div>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-recipe-btn">Save</button>
            </div>
          </div>
        </div>

        <!-- In-app delete confirmation (no window.confirm) -->
        <div id="delete-confirm-bar">
          <p id="delete-confirm-msg">Delete this recipe? This cannot be undone.</p>
          <div class="confirm-buttons">
            <button id="confirm-cancel-btn">Cancel</button>
            <button id="confirm-delete-btn">Delete</button>
          </div>
        </div>

        <!-- Nav bar with labels -->
        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">
            <!-- box / crate icon -->
            <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M80 128C80 99.4 103.4 76 132 76L508 76C536.6 76 560 99.4 560 128L560 192L80 192L80 128zM272 128L272 192L368 192L368 128L272 128zM64 224L576 224L576 512C576 540.6 552.6 564 524 564L116 564C87.4 564 64 540.6 64 512L64 224zM272 288L272 432C272 440.8 279.2 448 288 448L352 448C360.8 448 368 440.8 368 432L368 288C368 279.2 360.8 272 352 272L288 272C279.2 272 272 279.2 272 288z"/>
            </svg>
            <span class="nav-label">Inventory</span>
          </a>
          <a href="recipe-book.html" class="nav-buttons" id="selected">
            <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"/>
            </svg>
            <span class="nav-label">Recipes</span>
          </a>
          <a href="shopping.html" class="nav-buttons">
            <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M112 208C138.5 208 160 186.5 160 160C160 133.5 138.5 112 112 112C85.5 112 64 133.5 64 160C64 186.5 85.5 208 112 208zM256 128C238.3 128 224 142.3 224 160C224 177.7 238.3 192 256 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L256 128zM256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L256 288zM256 448C238.3 448 224 462.3 224 480C224 497.7 238.3 512 256 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L256 448zM112 528C138.5 528 160 506.5 160 480C160 453.5 138.5 432 112 432C85.5 432 64 453.5 64 480C64 506.5 85.5 528 112 528zM160 320C160 293.5 138.5 272 112 272C85.5 272 64 293.5 64 320C64 346.5 85.5 368 112 368C138.5 368 160 346.5 160 320z"/>
            </svg>
            <span class="nav-label">Shopping</span>
          </a>
        </div>

      </div>
    </div>

    <script>
      initStorage();

      const recipeTableBody  = document.getElementById("recipe-table-body");
      const modalOverlay     = document.getElementById("modal-overlay");
      const newRecipeBtn     = document.getElementById("new-recipe");
      const cancelBtn        = document.getElementById("cancel-btn");
      const saveRecipeBtn    = document.getElementById("save-recipe-btn");
      const recipeNameInput  = document.getElementById("recipe-name-input");
      const recipeDescInput  = document.getElementById("recipe-description-input");
      const recipeTagsInput  = document.getElementById("recipe-tags-input");
      const ingredientInput  = document.getElementById("ingredient-input");
      const ingredientAmt    = document.getElementById("ingredient-amount-input");
      const addIngredientBtn = document.getElementById("add-ingredient-btn");
      const ingredientList   = document.getElementById("ingredient-list");
      const searchInput      = document.getElementById("search-input");
      const sortSelect       = document.getElementById("sort-select");
      const availableToggle  = document.getElementById("available-toggle");
      const tagFilterSelect  = document.getElementById("tag-filter-select");
      const modalError       = document.getElementById("modal-error");
      const deleteConfirmBar = document.getElementById("delete-confirm-bar");
      const deleteConfirmMsg = document.getElementById("delete-confirm-msg");
      const confirmCancelBtn = document.getElementById("confirm-cancel-btn");
      const confirmDeleteBtn = document.getElementById("confirm-delete-btn");

      let currentIngredients = [];
      let pendingDeleteId    = null;

      function showError(msg) {
        modalError.textContent = msg;
        modalError.classList.add("visible");
      }
      function clearError() {
        modalError.textContent = "";
        modalError.classList.remove("visible");
      }

      function ingredientSummary(ingredients) {
        return ingredients.filter(Boolean).map(i => i.name || i).join(", ");
      }

      function buildTagCell(tagsStr) {
        if (!tagsStr) return "<span style='color:#aaa'>—</span>";
        const tags = tagsStr.split(",").map(t => t.trim()).filter(Boolean);
        return `<div class="tag-cell">${tags.map(t => `<span class="tag-pill">${t}</span>`).join("")}</div>`;
      }

      function getFilteredAndSorted() {
        let recipes = availableToggle.checked ? getAvailableRecipes() : getRecipes();
        const query = searchInput.value.trim().toLowerCase();
        if (query) recipes = recipes.filter(r => r && r.name.toLowerCase().includes(query));

        const selectedTag = tagFilterSelect.value;
        if (selectedTag !== "all") {
          recipes = recipes.filter(r => {
            if (!r) return false;
            const tags = typeof r.tags === "string" ? r.tags.split(",").map(t => t.trim()) : r.tags;
            return tags.some(t => t.toLowerCase() === selectedTag.toLowerCase());
          });
        }

        const sort = sortSelect.value;
        if (sort === "name-asc")  recipes.sort((a, b) => a.name.localeCompare(b.name));
        if (sort === "name-desc") recipes.sort((a, b) => b.name.localeCompare(a.name));
        if (sort === "tag") {
          recipes.sort((a, b) => {
            const tA = typeof a.tags === "string" ? a.tags : a.tags.join(", ");
            const tB = typeof b.tags === "string" ? b.tags : b.tags.join(", ");
            return tA.localeCompare(tB);
          });
        }
        return recipes;
      }

      function renderRecipes() {
        const recipes = getFilteredAndSorted();
        recipeTableBody.innerHTML = "";

        if (recipes.length === 0) {
          recipeTableBody.innerHTML = `<tr><td colspan="4" class="empty-row">No recipes found.</td></tr>`;
          return;
        }

        recipes.forEach(recipe => {
          if (!recipe) return;
          const tr = document.createElement("tr");
          tr.classList.add("recipe-row");

          tr.innerHTML = `
            <td class="col-name cell-name">${recipe.name}</td>
            <td class="col-ingredients cell-truncate">${ingredientSummary(recipe.ingredients) || "—"}</td>
            <td class="col-tags">${buildTagCell(recipe.tags)}</td>
            <td class="col-caret">
              <svg class="caret-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path d="M422.6 278.6L278.6 422.6C272.4 428.9 264 432 256 432C247.6 432 239.2 428.9 232.9 422.6C220.4 410.1 220.4 389.9 232.9 377.4L354.7 256L232.9 134.6C220.4 122.1 220.4 101.9 232.9 89.4C245.4 76.9 265.6 76.9 278.1 89.4L422.1 233.4C434.6 245.9 434.6 266.1 422.6 278.6z"/>
              </svg>
            </td>
          `;

          tr.addEventListener("click", () => {
            window.location.href = `recipe-detail.html?id=${recipe.id}`;
          });

          recipeTableBody.appendChild(tr);
        });
      }

      /* delete confirm */
      function askDeleteRecipe(id, name, event) {
        event.stopPropagation();
        pendingDeleteId = id;
        deleteConfirmMsg.textContent = `Delete "${name}"? This cannot be undone.`;
        deleteConfirmBar.classList.add("visible");
      }
      confirmCancelBtn.addEventListener("click", () => {
        pendingDeleteId = null;
        deleteConfirmBar.classList.remove("visible");
      });
      confirmDeleteBtn.addEventListener("click", () => {
        if (pendingDeleteId) {
          deleteRecipe(pendingDeleteId);
          pendingDeleteId = null;
          deleteConfirmBar.classList.remove("visible");
          populateTagFilter();
          renderRecipes();
        }
      });

      /* modal */
      function openModal() {
        recipeNameInput.value = "";
        recipeDescInput.value = "";
        recipeTagsInput.value = "";
        ingredientInput.value = "";
        ingredientAmt.value = "";
        currentIngredients = [];
        clearError();
        renderIngredientList();
        modalOverlay.classList.add("open");
      }
      function closeModal() {
        modalOverlay.classList.remove("open");
        clearError();
      }
      function renderIngredientList() {
        ingredientList.innerHTML = "";
        currentIngredients.forEach((ing, index) => {
          const li = document.createElement("li");
          const qty = ing.quantity && ing.quantity !== 1 ? ` (${ing.quantity})` : "";
          li.innerHTML = `<span>${ing.name}${qty}</span><button onclick="removeIngredient(${index})">✕</button>`;
          ingredientList.appendChild(li);
        });
      }
      function addIngredient() {
        const name = ingredientInput.value.trim();
        if (!name) return;
        const amount = ingredientAmt.value.trim();
        currentIngredients.push(new Ingredient("i-" + Date.now(), name, "", "2026-01-01", "pantry", amount || 1));
        ingredientInput.value = "";
        ingredientAmt.value = "";
        clearError();
        renderIngredientList();
      }
      function removeIngredient(index) {
        currentIngredients.splice(index, 1);
        renderIngredientList();
      }
      function saveRecipe() {
        const name = recipeNameInput.value.trim();
        if (!name) { showError("Please enter a recipe name."); return; }
        if (currentIngredients.length === 0) { showError("Please add at least one ingredient."); return; }
        addRecipe(new Recipe("r" + Date.now(), name, recipeDescInput.value, recipeTagsInput.value.trim(), currentIngredients));
        closeModal();
        populateTagFilter();
        renderRecipes();
      }

      function populateTagFilter() {
        const all = getRecipes().flatMap(r => {
          if (!r) return [];
          return typeof r.tags === "string" ? r.tags.split(",").map(t => t.trim()) : r.tags;
        });
        const unique = [...new Set(all)].filter(Boolean).sort();
        tagFilterSelect.innerHTML = `<option value="all">All Tags</option>`;
        unique.forEach(tag => {
          const opt = document.createElement("option");
          opt.value = tag; opt.textContent = tag;
          tagFilterSelect.appendChild(opt);
        });
      }

      newRecipeBtn.addEventListener("click", openModal);
      cancelBtn.addEventListener("click", closeModal);
      saveRecipeBtn.addEventListener("click", saveRecipe);
      addIngredientBtn.addEventListener("click", addIngredient);
      ingredientInput.addEventListener("keypress",  e => { if (e.key === "Enter") addIngredient(); });
      ingredientAmt.addEventListener("keypress",    e => { if (e.key === "Enter") addIngredient(); });
      searchInput.addEventListener("input",         renderRecipes);
      sortSelect.addEventListener("change",         renderRecipes);
      availableToggle.addEventListener("change",    renderRecipes);
      tagFilterSelect.addEventListener("change",    renderRecipes);
      modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });

      populateTagFilter();
      renderRecipes();
    </script>
  </body>
</html>
