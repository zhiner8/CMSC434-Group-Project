<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../recipe-book.css" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>

    <style>
      #modal-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 10;
        justify-content: center;
        align-items: center;
      }

      #modal-overlay.open {
        display: flex;
      }

      #recipe-modal {
        background: var(--off-white);
        border-radius: 16px;
        padding: 24px;
        width: 80%;
        max-height: 80%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #recipe-modal h3 {
        color: var(--dark-text);
        margin: 0;
        font-size: 22px;
      }

      #recipe-modal input[type="text"] {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--accent-blue-2);
        font-family: "Roboto", sans-serif;
        font-size: 16px;
        color: var(--dark-text);
        box-sizing: border-box;
      }

      #recipe-modal label {
        color: var(--dark-text);
        font-size: 16px;
        font-weight: 500;
      }

      #ingredient-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #ingredient-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--accent-blue-2);
        color: var(--off-white);
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 16px;
        border: none;
      }

      #ingredient-list li button {
        background: none;
        border: none;
        color: var(--off-white);
        cursor: pointer;
        font-size: 16px;
      }

      #ingredient-input-row {
        display: flex;
        gap: 8px;
      }

      #ingredient-input-row input {
        flex: 1;
      }

      #add-ingredient-btn {
        padding: 8px 14px;
        background: var(--accent-blue-2);
        color: var(--off-white);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      #modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      #modal-buttons button {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }

      #save-recipe-btn {
        background: var(--accent-blue-1);
        color: var(--off-white);
      }

      #cancel-btn {
        background: #ccc;
        color: var(--dark-text);
      }

      #search-sort-bar {
        display: flex;
        gap: 8px;
        padding: 10px 16px;
        align-items: center;
        border-bottom: 1px solid var(--accent-blue-1);
      }

      #search-input {
        flex: 1;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--accent-blue-2);
        font-family: "Roboto", sans-serif;
        font-size: 16px;
        color: var(--dark-text);
        background: var(--off-white);
      }

      #sort-select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--accent-blue-2);
        font-family: "Roboto", sans-serif;
        font-size: 16px;
        color: var(--dark-text);
        background: var(--off-white);
        cursor: pointer;
      }

      #filter-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        border-bottom: 1px solid var(--accent-blue-1);
      }

      #available-toggle {
        appearance: none;
        width: 40px;
        height: 22px;
        background: #ccc;
        border-radius: 11px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s;
        flex-shrink: 0;
      }

      #available-toggle::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        background: white;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: left 0.2s;
      }

      #available-toggle:checked {
        background: var(--accent-blue-2);
      }

      #available-toggle:checked::after {
        left: 21px;
      }

      #filter-label {
        font-size: 16px;
        color: var(--dark-text);
      }
    </style>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Kitchen Kompanion</h1>
        </div>
        <div id="recipe-book-tab">
          <div id="recipe-book-header">
            <h2>Recipe Book</h2>
          </div>
          <div id="new-recipe-container">
            <button id="new-recipe">+</button>
          </div>

          <div id="search-sort-bar">
            <input type="text" id="search-input" placeholder="Search recipes..." />
            <select id="sort-select">
              <option value="none">Sort by...</option>
              <option value="name-asc">Name (A–Z)</option>
              <option value="name-desc">Name (Z–A)</option>
              <option value="tag">Tag</option>
            </select>
          </div>

          <div id="filter-bar">
            <input type="checkbox" id="available-toggle" />
            <label id="filter-label" for="available-toggle">Show only recipes I can make</label>
          </div>

          <div id="recipe-list">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Ingredients</th>
                  <th>Tags</th>
                </tr>
              </thead>
              <tbody id="recipe-table-body"></tbody>
            </table>
          </div>
        </div>

        <div id="modal-overlay">
          <div id="recipe-modal">
            <h3>New Recipe</h3>

            <label>Name</label>
            <input type="text" id="recipe-name-input" placeholder="e.g. Spaghetti Bolognese" />

            <label>Tags <span style="font-weight:400;font-size:14px;">(comma separated)</span></label>
            <input type="text" id="recipe-tags-input" placeholder="e.g. Italian, Dinner" />

            <label>Ingredients</label>
            <ul id="ingredient-list"></ul>
            <div id="ingredient-input-row">
              <input type="text" id="ingredient-input" placeholder="e.g. tomato sauce" />
              <button id="add-ingredient-btn">Add</button>
            </div>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-recipe-btn">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">My Kitchen</a>
          <a href="recipe-book.html" class="nav-buttons" id="selected">Recipe Book</a>
          <a href="shopping.html" class="nav-buttons">Shopping Lists</a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const recipeTableBody = document.getElementById("recipe-table-body");
      const modalOverlay = document.getElementById("modal-overlay");
      const newRecipeBtn = document.getElementById("new-recipe");
      const cancelBtn = document.getElementById("cancel-btn");
      const saveRecipeBtn = document.getElementById("save-recipe-btn");
      const recipeNameInput = document.getElementById("recipe-name-input");
      const recipeTagsInput = document.getElementById("recipe-tags-input");
      const ingredientInput = document.getElementById("ingredient-input");
      const addIngredientBtn = document.getElementById("add-ingredient-btn");
      const ingredientList = document.getElementById("ingredient-list");
      const searchInput = document.getElementById("search-input");
      const sortSelect = document.getElementById("sort-select");
      const availableToggle = document.getElementById("available-toggle");

      let currentIngredients = [];

      function getFilteredAndSorted() {
        let recipes = availableToggle.checked
          ? getAvailableRecipes()
          : getRecipes();

        const query = searchInput.value.trim().toLowerCase();
        if (query) {
          recipes = recipes.filter((r) => r.name.toLowerCase().includes(query));
        }

        const sort = sortSelect.value;
        if (sort === "name-asc") {
          recipes.sort((a, b) => a.name.localeCompare(b.name));
        } else if (sort === "name-desc") {
          recipes.sort((a, b) => b.name.localeCompare(a.name));
        } else if (sort === "tag") {
          recipes.sort((a, b) => {
            const tagA = typeof a.tags === "string" ? a.tags : a.tags.join(", ");
            const tagB = typeof b.tags === "string" ? b.tags : b.tags.join(", ");
            return tagA.localeCompare(tagB);
          });
        }

        return recipes;
      }

      function renderRecipes() {
        const recipes = getFilteredAndSorted();
        recipeTableBody.innerHTML = "";

        if (recipes.length === 0) {
          recipeTableBody.innerHTML = `
            <tr>
              <td colspan="3" style="text-align:center; color:gray;">
                No recipes found.
              </td>
            </tr>
          `;
          return;
        }

        recipes.forEach((recipe) => {
          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          tr.innerHTML = `
            <td>${recipe.name}</td>
            <td>${recipe.ingredients.join(", ")}</td>
            <td>${recipe.tags}</td>
          `;
          tr.addEventListener("click", () => {
            window.location.href = `recipe-detail.html?id=${recipe.id}`;
          });
          recipeTableBody.appendChild(tr);
        });
      }

      function openModal() {
        recipeNameInput.value = "";
        recipeTagsInput.value = "";
        ingredientInput.value = "";
        currentIngredients = [];
        renderIngredientList();
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function renderIngredientList() {
        ingredientList.innerHTML = "";
        currentIngredients.forEach((ing, index) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <span>${ing}</span>
            <button onclick="removeIngredient(${index})">✕</button>
          `;
          ingredientList.appendChild(li);
        });
      }

      function addIngredient() {
        const val = ingredientInput.value.trim();
        if (!val) return;
        currentIngredients.push(val);
        ingredientInput.value = "";
        renderIngredientList();
      }

      function removeIngredient(index) {
        currentIngredients.splice(index, 1);
        renderIngredientList();
      }

      function saveRecipe() {
        const name = recipeNameInput.value.trim();
        if (!name) {
          alert("Please enter a recipe name.");
          return;
        }
        if (currentIngredients.length === 0) {
          alert("Please add at least one ingredient.");
          return;
        }

        addRecipe({
          name: name,
          description: "",
          tags: recipeTagsInput.value.trim(),
          ingredients: currentIngredients,
        });

        closeModal();
        renderRecipes();
      }

      newRecipeBtn.addEventListener("click", openModal);
      cancelBtn.addEventListener("click", closeModal);
      saveRecipeBtn.addEventListener("click", saveRecipe);
      addIngredientBtn.addEventListener("click", addIngredient);
      ingredientInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addIngredient();
      });
      searchInput.addEventListener("input", renderRecipes);
      sortSelect.addEventListener("change", renderRecipes);
      availableToggle.addEventListener("change", renderRecipes);

      renderRecipes();
    </script>
  </body>
</html>
