<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../recipe-book.css" />
    <script src="../storage.js"></script>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <h1>Recipe Book</h1>
        </div>
        <div id="recipe-container">
          <div id="recipe-toolbar">
            <div id="search-wrapper">
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"
                />
              </svg>
              <input
                type="text"
                id="search-input"
                placeholder="Search items..."
              />
            </div>
            <select id="sort-select">
              <option value="none">Sort by...</option>
              <option value="name-asc">Name (A–Z)</option>
              <option value="name-desc">Name (Z–A)</option>
              <option value="tag">Tag</option>
            </select>
            <div id="toolbar-buttons">
              <button id="new-recipe">
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M352 128C352 110.3 337.7 96 320 96C302.3 96 288 110.3 288 128L288 288L128 288C110.3 288 96 302.3 96 320C96 337.7 110.3 352 128 352L288 352L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 352L512 352C529.7 352 544 337.7 544 320C544 302.3 529.7 288 512 288L352 288L352 128z"
                  />
                </svg>
              </button>
              <button id="edit-button">
                <svg
                  class="icon"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M416.9 85.2L372 130.1L509.9 268L554.8 223.1C568.4 209.6 576 191.2 576 172C576 152.8 568.4 134.4 554.8 120.9L519.1 85.2C505.6 71.6 487.2 64 468 64C448.8 64 430.4 71.6 416.9 85.2zM338.1 164L122.9 379.1C112.2 389.8 104.4 403.2 100.3 417.8L64.9 545.6C62.6 553.9 64.9 562.9 71.1 569C77.3 575.1 86.2 577.5 94.5 575.2L222.3 539.7C236.9 535.6 250.2 527.9 261 517.1L476 301.9L338.1 164z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div id="filter-bar">
            <input type="checkbox" id="available-toggle" />
            <label id="filter-label" for="available-toggle"
              >Show only recipes I can make</label
            >
          </div>

          <div id="recipe-table-wrapper">
            <div id="recipe-table">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Ingredients</th>
                    <th>Tags</th>
                  </tr>
                </thead>
                <tbody id="recipe-table-body"></tbody>
              </table>
              <p
                id="no-recipes-msg"
                class="empty-message"
                style="display: none"
              >
                No recipes found.
              </p>
            </div>
          </div>
        </div>

        <div id="modal-overlay">
          <div id="recipe-modal">
            <h3>New Recipe</h3>

            <label>Name</label>
            <input
              type="text"
              id="recipe-name-input"
              placeholder="e.g. Spaghetti Bolognese"
            />

            <label>Description</label>
            <input
              type="text"
              id="recipe-description-input"
              placeholder="good weeknight dinner"
            />

            <label
              >Tags
              <span style="font-weight: 400; font-size: 14px"
                >(comma separated)</span
              ></label
            >
            <input
              type="text"
              id="recipe-tags-input"
              placeholder="e.g. Italian, Dinner"
            />

            <label>Ingredients</label>
            <ul id="ingredient-list"></ul>
            <div id="ingredient-input-row">
              <input
                type="text"
                id="ingredient-input"
                placeholder="e.g. tomato sauce"
              />
              <input
                type="text"
                id="ingredient-amount-input"
                placeholder="Amt."
              />
              <button id="add-ingredient-btn">Add</button>
            </div>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-recipe-btn">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">
            <!-- NAV ICONS FROM FONTAWESOME SVGS -->
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"
              />
            </svg>
          </a>
          <a href="recipe-book.html" class="nav-buttons" id="selected">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"
              />
            </svg>
          </a>
          <a href="shopping.html" class="nav-buttons">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M112 208C138.5 208 160 186.5 160 160C160 133.5 138.5 112 112 112C85.5 112 64 133.5 64 160C64 186.5 85.5 208 112 208zM256 128C238.3 128 224 142.3 224 160C224 177.7 238.3 192 256 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L256 128zM256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L256 288zM256 448C238.3 448 224 462.3 224 480C224 497.7 238.3 512 256 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L256 448zM112 528C138.5 528 160 506.5 160 480C160 453.5 138.5 432 112 432C85.5 432 64 453.5 64 480C64 506.5 85.5 528 112 528zM160 320C160 293.5 138.5 272 112 272C85.5 272 64 293.5 64 320C64 346.5 85.5 368 112 368C138.5 368 160 346.5 160 320z"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>

    <script>
      // pulls from storage.js
      initStorage();

      // grab everything :[]
      const recipeTableBody = document.getElementById("recipe-table-body");
      const modalOverlay = document.getElementById("modal-overlay");
      const newRecipeBtn = document.getElementById("new-recipe");
      const cancelBtn = document.getElementById("cancel-btn");
      const saveRecipeBtn = document.getElementById("save-recipe-btn");
      const recipeNameInput = document.getElementById("recipe-name-input");
      const recipeDescriptionInput = document.getElementById(
        "recipe-description-input"
      );
      const recipeTagsInput = document.getElementById("recipe-tags-input");
      const ingredientInput = document.getElementById("ingredient-input");
      const ingredientAmountInput = document.getElementById(
        "ingredient-amount-input"
      );
      const addIngredientBtn = document.getElementById("add-ingredient-btn");
      const ingredientList = document.getElementById("ingredient-list");
      const searchInput = document.getElementById("search-input");
      const sortSelect = document.getElementById("sort-select");
      const availableToggle = document.getElementById("available-toggle");

      // array to hold and store the ingredients
      let currentIngredients = [];

      // this applies search and sort to the recipe list, if notice any bugs please fix but seems to work
      function getFilteredAndSorted() {
        let recipes = availableToggle.checked
          ? getAvailableRecipes()
          : getRecipes();

        const query = searchInput.value.trim().toLowerCase();
        if (query) {
          recipes = recipes.filter((r) => {
            return r ? r.name.toLowerCase().includes(query) : false;
          });
        }

        const sort = sortSelect.value;
        if (sort === "name-asc") {
          recipes.sort((a, b) => a.name.localeCompare(b.name));
        } else if (sort === "name-desc") {
          recipes.sort((a, b) => b.name.localeCompare(a.name));
        } else if (sort === "tag") {
          recipes.sort((a, b) => {
            const tagA =
              typeof a.tags === "string" ? a.tags : a.tags.join(", ");
            const tagB =
              typeof b.tags === "string" ? b.tags : b.tags.join(", ");
            return tagA.localeCompare(tagB);
          });
        }

        return recipes;
      }
      // rebuild table based on current filters
      function renderRecipes() {
        const recipes = getFilteredAndSorted();
        recipeTableBody.innerHTML = "";
        const noMsg = document.getElementById("no-recipes-msg");

        if (recipes.length === 0) {
          noMsg.style.display = "block";
          return;
        }

        noMsg.style.display = "none";

        recipes.forEach((recipe) => {
          if (recipe) {
            const tr = document.createElement("tr");
            tr.style.cursor = "pointer";
            tr.innerHTML = `
              <td>${recipe.name}</td>
              <td>${recipe.ingredients
                .reduce((acc, curr) => {
                  if (!curr) return acc;
                  const qty =
                    curr.quantity && curr.quantity !== 1
                      ? ` (${curr.quantity})`
                      : "";
                  return acc + curr.name + qty + ", ";
                }, "")
                .replace(/, $/, "")}</td>
              <td>${recipe.tags}</td>
            `;
            // clciking a row goes to that recipes details
            tr.addEventListener("click", () => {
              window.location.href = `recipe-detail.html?id=${recipe.id}`;
            });
            recipeTableBody.appendChild(tr);
          }
        });
      }
      // modal stuff below !!

      function openModal() {
        recipeNameInput.value = "";
        recipeDescriptionInput.value = "";
        recipeTagsInput.value = "";
        ingredientInput.value = "";
        ingredientAmountInput.value = "";
        currentIngredients = [];
        renderIngredientList();
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function renderIngredientList() {
        ingredientList.innerHTML = "";
        currentIngredients.forEach((ing, index) => {
          const li = document.createElement("li");
          const qty =
            ing.quantity && ing.quantity !== 1 ? ` (${ing.quantity})` : "";
          li.innerHTML = `
            <span>${ing.name}${qty}</span>
            <button onclick="removeIngredient(${index})">✕</button>
          `;
          ingredientList.appendChild(li);
        });
      }

      function addIngredient() {
        const name = ingredientInput.value.trim();
        if (!name) return;
        const amount = ingredientAmountInput.value.trim();
        const val = new Ingredient(
          "i-" + Date.now(),
          name,
          "",
          "2026-01-01",
          "pantry",
          amount || 1
        );
        currentIngredients.push(val);
        ingredientInput.value = "";
        ingredientAmountInput.value = "";
        renderIngredientList();
      }

      function removeIngredient(index) {
        currentIngredients.splice(index, 1);
        renderIngredientList();
      }
      // creates the recipe object and saves it and re makes
      function saveRecipe() {
        const name = recipeNameInput.value.trim();
        const description = recipeDescriptionInput.value;
        const tags = recipeTagsInput.value.trim();
        const ingredients = currentIngredients;

        if (!name) {
          alert("Please enter a recipe name.");
          return;
        }
        if (currentIngredients.length === 0) {
          alert("Please add at least one ingredient.");
          return;
        }

        const recipe = new Recipe(
          "r" + Date.now(),
          name,
          description,
          tags,
          ingredients
        );
        addRecipe(recipe);
        closeModal();
        renderRecipes();
      }
      // put button listeners below :)

      newRecipeBtn.addEventListener("click", openModal);
      cancelBtn.addEventListener("click", closeModal);
      saveRecipeBtn.addEventListener("click", saveRecipe);
      addIngredientBtn.addEventListener("click", addIngredient);
      ingredientInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addIngredient();
      });
      ingredientAmountInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addIngredient();
      });
      searchInput.addEventListener("input", renderRecipes);
      sortSelect.addEventListener("change", renderRecipes);
      availableToggle.addEventListener("change", renderRecipes);

      renderRecipes();
    </script>
  </body>
</html>
