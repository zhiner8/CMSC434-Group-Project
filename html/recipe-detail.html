<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Detail</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../storage.js"></script>

    <style>
      #detail-container {
        display: flex;
        flex-direction: column;
        padding: 20px;
        gap: 16px;
        color: var(--dark-text);
        overflow-y: auto;
        flex: 1;
      }

      #recipe-title {
        font-size: 32px;
        font-weight: 700;
        color: var(--dark-text);
        margin: 0;
      }

      #date-added {
        font-size: 14px;
        color: gray;
        margin: 0;
      }

      .section-label {
        font-size: 18px;
        font-weight: 500;
        color: var(--dark-text);
        margin-bottom: 6px;
      }

      #ingredients-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #ingredients-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        color: var(--dark-text);
        border-bottom: 1px solid #ddd;
        padding: 6px 0;
      }

      #tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag-pill {
        background: var(--accent-blue-2);
        color: var(--off-white);
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 16px;
      }

      #missing-section {
        background: #fff8f8;
        border: 1px solid #f5c6c6;
        border-radius: 10px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #missing-section.all-good {
        background: #f4fff8;
        border-color: #b2dfc2;
      }

      #missing-title {
        font-size: 16px;
        font-weight: 500;
        color: var(--dark-text);
      }

      #missing-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #missing-list li {
        font-size: 16px;
        color: #c0392b;
        display: flex;
        align-items: center;
        gap: 8px;
        border: none;
        padding: 2px 0;
      }

      #all-good-msg {
        font-size: 16px;
        color: #27ae60;
        display: none;
      }

      #add-to-shopping-btn {
        align-self: flex-start;
        background: var(--accent-blue-2);
        color: var(--off-white);
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
        display: none;
      }

      #add-to-shopping-btn:hover {
        background: var(--accent-blue-1);
      }

      #added-confirmation {
        font-size: 14px;
        color: #27ae60;
        display: none;
      }

      #action-buttons {
        display: flex;
        gap: 10px;
        margin-top: auto;
        justify-content: flex-end;
      }

      #delete-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #c0392b;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
      }

      #delete-btn:hover {
        background: #a93226;
      }

      #edit-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--accent-blue-2);
        color: var(--off-white);
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
      }

      #edit-btn:hover {
        background: var(--accent-blue-1);
      }

      #not-found {
        display: none;
        padding: 40px 20px;
        text-align: center;
        color: gray;
        font-size: 18px;
      }

      #modal-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 10;
        justify-content: center;
        align-items: center;
      }

      #modal-overlay.open {
        display: flex;
      }

      #recipe-modal {
        background: var(--off-white);
        border-radius: 16px;
        padding: 24px;
        width: 80%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #recipe-modal h3 {
        color: var(--dark-text);
        margin: 0;
        font-size: 22px;
      }

      #recipe-modal input[type="text"] {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--accent-blue-2);
        font-family: "Roboto", sans-serif;
        font-size: 16px;
        color: var(--dark-text);
        box-sizing: border-box;
      }

      #recipe-modal label {
        color: var(--dark-text);
        font-size: 16px;
        font-weight: 500;
      }

      #ingredient-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #ingredient-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--accent-blue-2);
        color: var(--off-white);
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 16px;
        border: none;
      }

      #ingredient-list li button {
        background: none;
        border: none;
        color: var(--off-white);
        cursor: pointer;
        font-size: 16px;
      }

      #ingredient-input-row {
        display: flex;
        gap: 8px;
      }

      #ingredient-input-row input {
        flex: 1;
      }

      #add-ingredient-btn {
        padding: 8px 14px;
        background: var(--accent-blue-2);
        color: var(--off-white);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      #modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      #modal-buttons button {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }

      #save-recipe-btn {
        background: var(--accent-blue-1);
        color: var(--off-white);
      }

      #cancel-btn {
        background: #ccc;
        color: var(--dark-text);
      }
    </style>
  </head>

  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <a href="recipe-book.html" id="back-button">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M73.4 297.4C60.9 309.9 60.9 330.2 73.4 342.7L233.4 502.7C245.9 515.2 266.2 515.2 278.7 502.7C291.2 490.2 291.2 469.9 278.7 457.4L173.3 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L173.3 288L278.7 182.6C291.2 170.1 291.2 149.8 278.7 137.3C266.2 124.8 245.9 124.8 233.4 137.3L73.4 297.3z"
              />
            </svg>
          </a>
          <h1>Recipe</h1>
        </div>

        <div id="detail-container">
          <p id="recipe-title"></p>
          <p id="date-added"></p>

          <div>
            <div class="section-label">Ingredients</div>
            <ul id="ingredients-list"></ul>
          </div>

          <div>
            <div class="section-label">Tags</div>
            <div id="tags-container"></div>
          </div>

          <div id="missing-section">
            <div id="missing-title">Missing ingredients</div>
            <ul id="missing-list"></ul>
            <p id="all-good-msg">You have everything!</p>
            <button id="add-to-shopping-btn">
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M0 72C0 58.7 10.7 48 24 48L69.3 48C96.4 48 119.6 67.4 124.4 94L124.8 96L537.5 96C557.5 96 572.6 114.2 568.9 133.9L537.8 299.8C532.1 330.1 505.7 352 474.9 352L171.3 352L176.4 380.3C178.5 391.7 188.4 400 200 400L456 400C469.3 400 480 410.7 480 424C480 437.3 469.3 448 456 448L200.1 448C165.3 448 135.5 423.1 129.3 388.9L77.2 102.6C76.5 98.8 73.2 96 69.3 96L24 96C10.7 96 0 85.3 0 72zM160 528C160 501.5 181.5 480 208 480C234.5 480 256 501.5 256 528C256 554.5 234.5 576 208 576C181.5 576 160 554.5 160 528zM384 528C384 501.5 405.5 480 432 480C458.5 480 480 501.5 480 528C480 554.5 458.5 576 432 576C405.5 576 384 554.5 384 528zM336 142.4C322.7 142.4 312 153.1 312 166.4L312 200L278.4 200C265.1 200 254.4 210.7 254.4 224C254.4 237.3 265.1 248 278.4 248L312 248L312 281.6C312 294.9 322.7 305.6 336 305.6C349.3 305.6 360 294.9 360 281.6L360 248L393.6 248C406.9 248 417.6 237.3 417.6 224C417.6 210.7 406.9 200 393.6 200L360 200L360 166.4C360 153.1 349.3 142.4 336 142.4z"
                />
              </svg>
              Add missing to shopping list
            </button>
            <p id="added-confirmation">
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M530.8 134.1C545.1 144.5 548.3 164.5 537.9 178.8L281.9 530.8C276.4 538.4 267.9 543.1 258.5 543.9C249.1 544.7 240 541.2 233.4 534.6L105.4 406.6C92.9 394.1 92.9 373.8 105.4 361.3C117.9 348.8 138.2 348.8 150.7 361.3L252.2 462.8L486.2 141.1C496.6 126.8 516.6 123.6 530.9 134z"
                />
              </svg>
              Added to shopping list!
            </p>
          </div>

          <div id="action-buttons">
            <button id="edit-btn">
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M416.9 85.2L372 130.1L509.9 268L554.8 223.1C568.4 209.6 576 191.2 576 172C576 152.8 568.4 134.4 554.8 120.9L519.1 85.2C505.6 71.6 487.2 64 468 64C448.8 64 430.4 71.6 416.9 85.2zM338.1 164L122.9 379.1C112.2 389.8 104.4 403.2 100.3 417.8L64.9 545.6C62.6 553.9 64.9 562.9 71.1 569C77.3 575.1 86.2 577.5 94.5 575.2L222.3 539.7C236.9 535.6 250.2 527.9 261 517.1L476 301.9L338.1 164z"
                />
              </svg>
              Edit
            </button>
            <button id="delete-btn">
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M232.7 69.9C237.1 56.8 249.3 48 263.1 48L377 48C390.8 48 403 56.8 407.4 69.9L416 96L512 96C529.7 96 544 110.3 544 128C544 145.7 529.7 160 512 160L128 160C110.3 160 96 145.7 96 128C96 110.3 110.3 96 128 96L224 96L232.7 69.9zM128 208L512 208L512 512C512 547.3 483.3 576 448 576L192 576C156.7 576 128 547.3 128 512L128 208zM216 272C202.7 272 192 282.7 192 296L192 488C192 501.3 202.7 512 216 512C229.3 512 240 501.3 240 488L240 296C240 282.7 229.3 272 216 272zM320 272C306.7 272 296 282.7 296 296L296 488C296 501.3 306.7 512 320 512C333.3 512 344 501.3 344 488L344 296C344 282.7 333.3 272 320 272zM424 272C410.7 272 400 282.7 400 296L400 488C400 501.3 410.7 512 424 512C437.3 512 448 501.3 448 488L448 296C448 282.7 437.3 272 424 272z"
                />
              </svg>
              Delete
            </button>
          </div>
        </div>

        <div id="not-found">
          <p>Recipe not found.</p>
          <a href="recipe-book.html">Go back</a>
        </div>

        <div id="modal-overlay">
          <div id="recipe-modal">
            <h3>Edit Recipe</h3>

            <label>Name</label>
            <input
              type="text"
              id="recipe-name-input"
              placeholder="e.g. Spaghetti Bolognese"
            />

            <label
              >Tags
              <span style="font-weight: 400; font-size: 14px"
                >(comma separated)</span
              ></label
            >
            <input
              type="text"
              id="recipe-tags-input"
              placeholder="e.g. Italian, Dinner"
            />

            <label>Ingredients</label>
            <ul id="ingredient-list"></ul>
            <div id="ingredient-input-row">
              <input
                type="text"
                id="ingredient-input"
                placeholder="e.g. tomato sauce"
              />
              <button id="add-ingredient-btn">Add</button>
            </div>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-recipe-btn">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">
            <!-- NAV ICONS FROM FONTAWESOME SVGS -->
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"
              />
            </svg>
          </a>
          <a href="recipe-book.html" class="nav-buttons" id="selected">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"
              />
            </svg>
          </a>
          <a href="shopping.html" class="nav-buttons">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M112 208C138.5 208 160 186.5 160 160C160 133.5 138.5 112 112 112C85.5 112 64 133.5 64 160C64 186.5 85.5 208 112 208zM256 128C238.3 128 224 142.3 224 160C224 177.7 238.3 192 256 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L256 128zM256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L256 288zM256 448C238.3 448 224 462.3 224 480C224 497.7 238.3 512 256 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L256 448zM112 528C138.5 528 160 506.5 160 480C160 453.5 138.5 432 112 432C85.5 432 64 453.5 64 480C64 506.5 85.5 528 112 528zM160 320C160 293.5 138.5 272 112 272C85.5 272 64 293.5 64 320C64 346.5 85.5 368 112 368C138.5 368 160 346.5 160 320z"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const params = new URLSearchParams(window.location.search);
      const recipeId = params.get("id");

      const detailContainer = document.getElementById("detail-container");
      const notFound = document.getElementById("not-found");
      const modalOverlay = document.getElementById("modal-overlay");
      const recipeNameInput = document.getElementById("recipe-name-input");
      const recipeTagsInput = document.getElementById("recipe-tags-input");
      const ingredientInput = document.getElementById("ingredient-input");
      const addIngredientBtn = document.getElementById("add-ingredient-btn");
      const ingredientList = document.getElementById("ingredient-list");
      const addToShoppingBtn = document.getElementById("add-to-shopping-btn");
      const addedConfirmation = document.getElementById("added-confirmation");
      const allGoodMsg = document.getElementById("all-good-msg");
      const missingSection = document.getElementById("missing-section");
      const missingList = document.getElementById("missing-list");

      let currentIngredients = [];
      let recipe = getRecipeById(recipeId);

      function renderMissingIngredients() {
        const missing = getMissingIngredients(recipeId);
        missingList.innerHTML = "";
        addedConfirmation.style.display = "none";

        if (missing.length === 0) {
          missingSection.classList.add("all-good");
          document.getElementById("missing-title").textContent =
            "Ingredients status";
          allGoodMsg.style.display = "block";
          addToShoppingBtn.style.display = "none";
        } else {
          missingSection.classList.remove("all-good");
          document.getElementById("missing-title").textContent =
            "Missing ingredients";
          allGoodMsg.style.display = "none";
          addToShoppingBtn.style.display = "inline-block";

          missing.forEach((ing) => {
            if (ing) {
              const li = document.createElement("li");
              li.innerHTML = `
              <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path d="M183.1 137.4C170.6 124.9 150.3 124.9 137.8 137.4C125.3 149.9 125.3 170.2 137.8 182.7L275.2 320L137.9 457.4C125.4 469.9 125.4 490.2 137.9 502.7C150.4 515.2 170.7 515.2 183.2 502.7L320.5 365.3L457.9 502.6C470.4 515.1 490.7 515.1 503.2 502.6C515.7 490.1 515.7 469.8 503.2 457.3L365.8 320L503.1 182.6C515.6 170.1 515.6 149.8 503.1 137.3C490.6 124.8 470.3 124.8 457.8 137.3L320.5 274.7L183.1 137.4z"/>
              </svg>
              ${ing.name}
            `;
              missingList.appendChild(li);
            }
          });
        }
      }

      function renderDetail() {
        recipe = getRecipeById(recipeId);

        document.getElementById("recipe-title").textContent = recipe.name;

        const dateEl = document.getElementById("date-added");
        if (recipe.createdAt) {
          dateEl.textContent =
            "Added " + new Date(recipe.createdAt).toLocaleDateString();
        } else {
          dateEl.style.display = "none";
        }

        const ingredientsList = document.getElementById("ingredients-list");
        ingredientsList.innerHTML = "";
        recipe.ingredients.forEach((ing) => {
          if (ing) {
            const li = document.createElement("li");
            li.innerHTML = `
              <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" style="width:0.6em; height:0.6em; color:var(--accent-blue-2)">
                <path d="M320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM320 224C373 224 416 267 416 320C416 373 373 416 320 416C267 416 224 373 224 320C224 267 267 224 320 224z"/>
              </svg>
              ${ing.name}
            `;
            ingredientsList.appendChild(li);
          }
        });

        const tagsContainer = document.getElementById("tags-container");
        tagsContainer.innerHTML = "";
        const tags =
          typeof recipe.tags === "string"
            ? recipe.tags
                .split(",")
                .map((t) => t.trim())
                .filter(Boolean)
            : recipe.tags;
        tags.forEach((tag) => {
          const pill = document.createElement("span");
          pill.className = "tag-pill";
          pill.textContent = tag;
          tagsContainer.appendChild(pill);
        });

        renderMissingIngredients();
      }

      function openModal() {
        recipeNameInput.value = recipe.name;
        recipeTagsInput.value = recipe.tags;
        currentIngredients = [...recipe.ingredients];
        renderIngredientList();
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function renderIngredientList() {
        console.log(currentIngredients);
        ingredientList.innerHTML = "";
        currentIngredients.forEach((ing, index) => {
          console.log(ing);
          if (ing) {
            const li = document.createElement("li");
            li.innerHTML = `
            <span>${ing.name}</span>
            <button onclick="removeIngredient(${index})">✕</button>
            `;
            ingredientList.appendChild(li);
          }
        });
      }

      function addIngredient() {
        const val = ingredientInput.value.trim();
        if (!val) return;
        currentIngredients.push(val);
        ingredientInput.value = "";
        renderIngredientList();
      }

      function removeIngredient(index) {
        currentIngredients.splice(index, 1);
        renderIngredientList();
      }

      function saveRecipe() {
        const name = recipeNameInput.value.trim();
        if (!name) {
          alert("Please enter a recipe name.");
          return;
        }
        if (currentIngredients.length === 0) {
          alert("Please add at least one ingredient.");
          return;
        }

        updateRecipe(recipeId, {
          name: name,
          tags: recipeTagsInput.value.trim(),
          ingredients: currentIngredients,
        });

        closeModal();
        renderDetail();
      }

      addToShoppingBtn.addEventListener("click", () => {
        window.location.href = `shopping-lists-display.html?id=${recipeId}`;
      });

      document.getElementById("edit-btn").addEventListener("click", openModal);
      document
        .getElementById("cancel-btn")
        .addEventListener("click", closeModal);
      document
        .getElementById("save-recipe-btn")
        .addEventListener("click", saveRecipe);
      addIngredientBtn.addEventListener("click", addIngredient);
      ingredientInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addIngredient();
      });

      document.getElementById("delete-btn").addEventListener("click", () => {
        const confirmed = confirm(
          `Delete "${recipe.name}"? This cannot be undone.`
        );
        if (confirmed) {
          deleteRecipe(recipe.id);
          window.location.href = "recipe-book.html";
        }
      });

      if (!recipe) {
        detailContainer.style.display = "none";
        notFound.style.display = "block";
      } else {
        renderDetail();
      }
    </script>
  </body>
</html>
