    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />

        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

        padding: 2px 10px;
        background: var(--accent-blue-2);
        color: var(--off-white);
        /* lol never seen this */
        border-radius: 999px;
        font-size: 12px;
        white-space: nowrap;
      }
      .preview-cell {
        color: #999;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <a href="shopping.html" id="back-button">

              />

                aria-hidden="true"

                />

                <tr>

              />
            </svg>
          </a>
          <a href="recipe-book.html" class="nav-buttons">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >

              />
            </svg>
          </a>
          <a href="shopping.html" class="nav-buttons" id="selected">

        </div>
      </div>
    </div>

    <script>
      initStorage();

      const tableBody = document.getElementById("starter-table-body");
      const searchInput = document.getElementById("search-input");

      function renderStarterLists() {
        const allLists = getShoppingLists();
        const query = searchInput.value.toLowerCase().trim();
        const starterLists = allLists.filter(
          (l) => l.isStarter && (l.name || "").toLowerCase().includes(query)
        );

        tableBody.innerHTML = "";

        if (starterLists.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:gray;">${
            query
              ? "No matching starter lists."
              : "No starter lists yet. Star a list to add it here."
          }</td></tr>`;
          return;
        }

        starterLists.forEach((list) => {
          const tagHTML = list.tags
            ? list.tags
                .split(",")
                .map((t) => `<span class="tag-pill">${t.trim()}</span>`)
                .join("")
            : "—";

          const itemPreview =
            list.ingredientList && list.ingredientList.length > 0
              ? list.ingredientList
                  .slice(0, 3)
                  .map((i) => (typeof i === "object" ? i.name : i))
                  .join(", ") + (list.ingredientList.length > 3 ? "…" : "")
              : "No items";

          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          tr.innerHTML = `
            <td>${list.name || "Unnamed List"}</td>
            <td><div class="tag-cell">${tagHTML}</div></td>
            <td class="preview-cell">${itemPreview}</td>
          `;

          tr.addEventListener("click", () => {
            const params = new URLSearchParams({
              prefillName: list.name,
              prefillDescription: list.description || "",
              prefillTags: list.tags || "",
              prefillItems: JSON.stringify(
                (list.ingredientList || []).map((i) =>
                  typeof i === "object"
                    ? { name: i.name, quantity: i.quantity || 1 }
                    : { name: i, quantity: 1 }
                )
              ),
            });
            window.location.href = `shopping.html?${params.toString()}`;
          });

          tableBody.appendChild(tr);
        });
      }

      searchInput.addEventListener("input", renderStarterLists);
      renderStarterLists();
    </script>
  </body>
</html>
