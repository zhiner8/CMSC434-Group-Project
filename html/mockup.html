<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock-Up</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles.css" />
    <script
      src="https://kit.fontawesome.com/75ab6db391.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div class="back-button">
          <i class="fa-solid fa-circle-left"></i><br />
        </div>
        <h1>Spaghetti</h1>
        <p class="date-added">Added 01/02/26</p>
        <!-- Main Content -->
        <div class="content">
          <!-- Details -->
          <div class="details-label">Details:</div>
          <div class="details-row">
            <div class="details-box">Good for weeknights</div>
            <div class="photo-box">&lt;User Photo&gt;</div>
          </div>

          <!-- Ingredients & Tags -->
          <div class="bottom-row">
            <div class="ingredients-col">
              <div class="section-label">Ingredients:</div>
              <div class="ingredient-item unchecked">
                <i class="fa-solid fa-xmark"></i> Tomato Sauce
              </div>
              <div class="ingredient-item checked">
                <i class="fa-solid fa-check"></i> Pasta
              </div>
              <span class="add-btn"
                ><i class="fa-solid fa-square-plus"></i
              ></span>
            </div>
            <div class="tags-col">
              <div class="section-label">Tags:</div>
              <div class="tag-item"><i class="fa-solid fa-tag"></i> Dinner</div>
              <div class="tag-item">
                <i class="fa-solid fa-tag"></i> Italian
              </div>
              <span class="add-btn"
                ><i class="fa-solid fa-square-plus"></i
              ></span>
            </div>
          </div>
        </div>

        <!-- Trash -->
        <div class="trash-btn">
          <i class="fa-solid fa-trash-can"></i>
        </div>
      </div>
    </div>
  </body>
</html>
