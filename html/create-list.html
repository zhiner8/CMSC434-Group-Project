<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create List</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../create-list.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <a href="shopping.html" id="back-button">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <h1>Create List</h1>
        </div>

        <div id="shopping-list-container">

          <div class="field-group">
            <label class="field-label" for="list-name-input">Name</label>
            <input class="text-input" type="text" id="list-name-input" placeholder="e.g. Weekly Groceries" />
          </div>

          <div class="field-group">
            <label class="field-label" for="description-input">Description</label>
            <textarea id="description-input" placeholder="e.g. Everything for the week's meals"></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="tags-input">
              Tags <span style="font-weight:400; font-size:16px;">(comma separated)</span>
            </label>
            <input class="text-input" type="text" id="tags-input" placeholder="e.g. Weekly, Produce, Meals" />
          </div>

          <hr class="divider" />

          <div class="field-group">
            <label class="field-label">Items</label>
            <div id="shopping-input-row">
              <input type="text" id="item-input" placeholder="Add new item..." />
              <button id="add-item">Add</button>
            </div>
          </div>

          <ul id="items-ul"></ul>

          <button id="create-list-button">Create List</button>

        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">My Kitchen</a>
          <a href="recipe-book.html" class="nav-buttons">Recipe Book</a>
          <a href="shopping.html" class="nav-buttons" id="selected">Shopping Lists</a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const itemInput = document.getElementById("item-input");
      const addItemButton = document.getElementById("add-item");
      const itemsUl = document.getElementById("items-ul");
      const createListButton = document.getElementById("create-list-button");
      const listNameInput = document.getElementById("list-name-input");
      const descriptionInput = document.getElementById("description-input");
      const tagsInput = document.getElementById("tags-input");

      let draftList = [];

      const params = new URLSearchParams(window.location.search);

      if (params.get("prefillName")) {
        listNameInput.value = params.get("prefillName");
      }

      if (params.get("prefillDescription")) {
        descriptionInput.value = params.get("prefillDescription");
      }

      if (params.get("prefillTags")) {
        tagsInput.value = params.get("prefillTags");
      }
      
      if (params.get("prefillItems")) {
        const prefillItems = JSON.parse(params.get("prefillItems"));
        prefillItems.forEach((name) => {
          draftList.push(new Ingredient("i-" + Date.now() + Math.random(), name, "", null, "Pantry", 1));
        });
      }

      function renderList() {
        itemsUl.innerHTML = "";
        draftList.forEach((item, index) => {
          const li = document.createElement("li");

          if (item._editing) {
            li.innerHTML = `
              <input class="edit-inline-input" type="text" value="${item.name}" id="edit-input-${index}" />
              <div class="item-action-buttons">
                <button onclick="saveEdit(${index})">Save</button>
                <button onclick="cancelEdit(${index})">Cancel</button>
              </div>
            `;
          } else {
            li.innerHTML = `
              <span>${item.name}</span>
              <div class="item-action-buttons">
                <button onclick="startEdit(${index})">Edit</button>
                <button onclick="removeItem(${index})">Remove</button>
              </div>
            `;
          }
          // ────────────────────────────────────────────────────────────────

          itemsUl.appendChild(li);
        });
      }

      function addItem() {
        const itemName = itemInput.value.trim();
        if (itemName !== "") {
          const newIngredient = new Ingredient(
            "i-" + Date.now(),
            itemName,
            "",
            null,
            "Pantry",
            1
          );
          draftList.push(newIngredient);
          itemInput.value = "";
          renderList();
        }
      }

      function removeItem(index) {
        draftList.splice(index, 1);
        renderList();
      }

      function startEdit(index) {
        draftList[index]._editing = true;
        renderList();
        document.getElementById(`edit-input-${index}`).focus();
      }

      function saveEdit(index) {
        const input = document.getElementById(`edit-input-${index}`);
        const newName = input.value.trim();
        if (newName !== "") {
          draftList[index].name = newName;
        }
        draftList[index]._editing = false;
        renderList();
      }

      function cancelEdit(index) {
        draftList[index]._editing = false;
        renderList();
      }
      
      function createList() {
        if (draftList.length === 0) {
          alert("Add at least one item before creating a list.");
          return;
        }

        const newList = new ShoppingList(
          "l-" + Date.now(),
          listNameInput.value.trim() || "New List",
          descriptionInput.value.trim(),
          tagsInput.value.trim(),
          new Date().toISOString(),
          draftList,
          false
        );

        addShoppingList(newList);
        window.location.href = "shopping.html";
      }

      addItemButton.addEventListener("click", addItem);
      itemInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addItem();
      });
      createListButton.addEventListener("click", createList);

      renderList();
    </script>
  </body>
</html>
