<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create List</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="../storage.js"></script>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <!-- back button SVG from FONTAWESOME-->
          <a href="shopping.html" id="back-button">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M73.4 297.4C60.9 309.9 60.9 330.2 73.4 342.7L233.4 502.7C245.9 515.2 266.2 515.2 278.7 502.7C291.2 490.2 291.2 469.9 278.7 457.4L173.3 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L173.3 288L278.7 182.6C291.2 170.1 291.2 149.8 278.7 137.3C266.2 124.8 245.9 124.8 233.4 137.3L73.4 297.3z"
              />
            </svg>
          </a>
          <h1>Create List</h1>
          <div id="header-actions">
            <button id="add-button" title="Add item">
              <!-- plus symbol SVG from FONTAWESOME -->
              <svg
                class="icon"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
              >
                <path
                  d="M352 128C352 110.3 337.7 96 320 96C302.3 96 288 110.3 288 128L288 288L128 288C110.3 288 96 302.3 96 320C96 337.7 110.3 352 128 352L288 352L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 352L512 352C529.7 352 544 337.7 544 320C544 302.3 529.7 288 512 288L352 288L352 128z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div id="shopping-list-container">
          <div class="field-group">
            <label class="field-label" for="list-name-input">Name</label>
            <input
              class="text-input"
              type="text"
              id="list-name-input"
              placeholder="e.g. Weekly Groceries"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="description-input"
              >Description</label
            >
            <textarea
              id="description-input"
              placeholder="e.g. Everything for the week's meals"
            ></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="tags-input">
              Tags
              <span style="font-weight: 400; font-size: 16px"
                >(comma separated)</span
              >
            </label>
            <input
              class="text-input"
              type="text"
              id="tags-input"
              placeholder="e.g. Weekly, Produce, Meals"
            />
          </div>

          <hr class="divider" />

          <div class="field-group">
            <label class="field-label">Items</label>
          </div>

          <ul id="items-ul"></ul>

          <button id="create-list-button">Create List</button>
        </div>

        <div id="modal-overlay">
          <div id="inventory-modal">
            <h3>New Item</h3>

            <label for="inventory-name-input">Name*</label>
            <input
              type="text"
              id="inventory-name-input"
              placeholder="e.g. Lettuce"
            />

            <label for="inventory-description-input">Description</label>
            <input
              type="text"
              id="inventory-description-input"
              placeholder="..."
            />

            <label for="inventory-useBy-input">Use-By</label>
            <input type="date" id="inventory-useBy-input" />

            <label for="inventory-quantity-input">Quantity</label>
            <input type="number" id="inventory-quantity-input" />

            <label for="inventory-location-input">Location*</label>
            <select id="inventory-location-input">
              <option value="">Select a location</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-item-btn">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons">
            <!-- NAV ICONS FROM FONTAWESOME SVGS -->
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"
              />
            </svg>
          </a>
          <a href="recipe-book.html" class="nav-buttons">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z"
              />
            </svg>
          </a>
          <a href="shopping.html" class="nav-buttons" id="selected">
            <svg
              class="icon"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M112 208C138.5 208 160 186.5 160 160C160 133.5 138.5 112 112 112C85.5 112 64 133.5 64 160C64 186.5 85.5 208 112 208zM256 128C238.3 128 224 142.3 224 160C224 177.7 238.3 192 256 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L256 128zM256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L256 288zM256 448C238.3 448 224 462.3 224 480C224 497.7 238.3 512 256 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L256 448zM112 528C138.5 528 160 506.5 160 480C160 453.5 138.5 432 112 432C85.5 432 64 453.5 64 480C64 506.5 85.5 528 112 528zM160 320C160 293.5 138.5 272 112 272C85.5 272 64 293.5 64 320C64 346.5 85.5 368 112 368C138.5 368 160 346.5 160 320z"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>

    <script>
      // creates the storage from storage.js
      initStorage();

      // grabs the needed elements to read
      const itemsUl = document.getElementById("items-ul");
      const createListButton = document.getElementById("create-list-button");
      const listNameInput = document.getElementById("list-name-input");
      const descriptionInput = document.getElementById("description-input");
      const tagsInput = document.getElementById("tags-input");
      const modalOverlay = document.getElementById("modal-overlay");
      const inventoryNameInput = document.getElementById(
        "inventory-name-input"
      );
      const inventoryDescriptionInput = document.getElementById(
        "inventory-description-input"
      );
      const inventoryUseByInput = document.getElementById(
        "inventory-useBy-input"
      );
      const inventoryQuantityInput = document.getElementById(
        "inventory-quantity-input"
      );
      const inventoryLocationInput = document.getElementById(
        "inventory-location-input"
      );

      //   holds items being built before list is saved
      let draftList = [];
      // this allows other pages to be populate this form
      const params = new URLSearchParams(window.location.search);

      if (params.get("prefillName"))
        listNameInput.value = params.get("prefillName");
      if (params.get("prefillDescription"))
        descriptionInput.value = params.get("prefillDescription");
      if (params.get("prefillTags"))
        tagsInput.value = params.get("prefillTags");
      if (params.get("prefillItems")) {
        const prefillItems = JSON.parse(params.get("prefillItems"));
        prefillItems.forEach((name) => {
          draftList.push(
            new Ingredient(
              "i-" + Date.now() + Math.random(),
              name,
              "",
              null,
              "Pantry",
              1
            )
          );
        });
      }
      // opens the add item modal
      function openModal() {
        inventoryNameInput.value = "";
        inventoryDescriptionInput.value = "";
        inventoryUseByInput.value = "";
        inventoryQuantityInput.value = "";
        inventoryLocationInput.value = "";
        modalOverlay.classList.add("open");
        inventoryNameInput.focus();
      }
      //closes the modal
      function closeModal() {
        modalOverlay.classList.remove("open");
      }
      //creates new ingredient from modal fields? Is this necessary after we swtiched to hardcode backend?
      function saveItem() {
        const name = inventoryNameInput.value.trim();
        const location = inventoryLocationInput.value;

        if (!name) {
          alert("Please enter an item name.");
          return;
        }
        if (!location) {
          alert("Please select a location.");
          return;
        }

        const newItem = new Ingredient(
          "i-" + Date.now(),
          name,
          inventoryDescriptionInput.value.trim(),
          inventoryUseByInput.value || null,
          location,
          inventoryQuantityInput.value || 1
        );

        draftList.push(newItem);
        closeModal();
        renderList();
      }
      // renders list from scratch based on current array
      function renderList() {
        itemsUl.innerHTML = "";
        draftList.forEach((item, index) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <span>${item.name}${
            item.quantity && item.quantity !== 1
              ? ` <span class="item-quantity">(${item.quantity})</span>`
              : ""
          }</span>
            <div class="item-action-buttons">
              <button onclick="removeItem(${index})">Remove</button>
            </div>
          `;
          itemsUl.appendChild(li);
        });
      }
      // removes an item from draftList
      function removeItem(index) {
        draftList.splice(index, 1);
        renderList();
      }
      // saves as new shopping List object, this is good
      function createList() {
        if (draftList.length === 0) {
          alert("Add at least one item before creating a list.");
          return;
        }
        const newList = new ShoppingList(
          "l-" + Date.now(),
          listNameInput.value.trim() || "New List",
          descriptionInput.value.trim(),
          tagsInput.value.trim(),
          new Date().toISOString(),
          draftList,
          false
        );
        addShoppingList(newList);
        window.location.href = "shopping.html";
      }
      // event listeners to do actions
      document
        .getElementById("add-button")
        .addEventListener("click", openModal);
      document
        .getElementById("cancel-btn")
        .addEventListener("click", closeModal);
      document
        .getElementById("save-item-btn")
        .addEventListener("click", saveItem);
      inventoryNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") saveItem();
      });
      createListButton.addEventListener("click", createList);

      renderList();
    </script>
  </body>
</html>
