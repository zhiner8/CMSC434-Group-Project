<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create List</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../my-kitchen.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/75ab6db391.js" crossorigin="anonymous"></script>
    <script src="../storage.js"></script>
  </head>
  <body>
    <div id="device">
      <div id="screen">
        <div id="header">
          <a href="shopping.html" id="back-button">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <h1>Create List</h1>
          <div id="header-actions">
            <button id="add-button" title="Add item">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>

        <div id="shopping-list-container">
          <div class="field-group">
            <label class="field-label" for="list-name-input">Name</label>
            <input class="text-input" type="text" id="list-name-input" placeholder="e.g. Weekly Groceries" />
          </div>

          <div class="field-group">
            <label class="field-label" for="description-input">Description</label>
            <textarea id="description-input" placeholder="e.g. Everything for the week's meals"></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="tags-input">
              Tags <span style="font-weight:400; font-size:16px;">(comma separated)</span>
            </label>
            <input class="text-input" type="text" id="tags-input" placeholder="e.g. Weekly, Produce, Meals" />
          </div>

          <hr class="divider" />

          <div class="field-group">
            <label class="field-label">Items</label>
          </div>

          <ul id="items-ul"></ul>

          <button id="create-list-button">Create List</button>
        </div>

        <div id="modal-overlay">
          <div id="inventory-modal">
            <h3>New Item</h3>

            <label for="inventory-name-input">Name*</label>
            <input type="text" id="inventory-name-input" placeholder="e.g. Lettuce" />

            <label for="inventory-description-input">Description</label>
            <input type="text" id="inventory-description-input" placeholder="..." />

            <label for="inventory-useBy-input">Use-By</label>
            <input type="date" id="inventory-useBy-input" />

            <label for="inventory-quantity-input">Quantity</label>
            <input type="number" id="inventory-quantity-input" />

            <label for="inventory-location-input">Location*</label>
            <select id="inventory-location-input">
              <option value="">Select a location</option>
              <option value="Fridge">Fridge</option>
              <option value="Pantry">Pantry</option>
              <option value="Freezer">Freezer</option>
              <option value="Other">Other</option>
            </select>

            <div id="modal-buttons">
              <button id="cancel-btn">Cancel</button>
              <button id="save-item-btn">Save</button>
            </div>
          </div>
        </div>

        <div id="nav-bar">
          <a href="my-kitchen.html" class="nav-buttons"><i class="fas fa-home"></i></a>
          <a href="recipe-book.html" class="nav-buttons"><i class="fas fa-book"></i></a>
          <a href="shopping.html" class="nav-buttons" id="selected"><i class="fas fa-list-ul"></i></a>
        </div>
      </div>
    </div>

    <script>
      initStorage();

      const itemsUl = document.getElementById("items-ul");
      const createListButton = document.getElementById("create-list-button");
      const listNameInput = document.getElementById("list-name-input");
      const descriptionInput = document.getElementById("description-input");
      const tagsInput = document.getElementById("tags-input");
      const modalOverlay = document.getElementById("modal-overlay");
      const inventoryNameInput = document.getElementById("inventory-name-input");
      const inventoryDescriptionInput = document.getElementById("inventory-description-input");
      const inventoryUseByInput = document.getElementById("inventory-useBy-input");
      const inventoryQuantityInput = document.getElementById("inventory-quantity-input");
      const inventoryLocationInput = document.getElementById("inventory-location-input");

      let draftList = [];

      const params = new URLSearchParams(window.location.search);

      if (params.get("prefillName")) listNameInput.value = params.get("prefillName");
      if (params.get("prefillDescription")) descriptionInput.value = params.get("prefillDescription");
      if (params.get("prefillTags")) tagsInput.value = params.get("prefillTags");
      if (params.get("prefillItems")) {
        const prefillItems = JSON.parse(params.get("prefillItems"));
        prefillItems.forEach((name) => {
          draftList.push(new Ingredient("i-" + Date.now() + Math.random(), name, "", null, "Pantry", 1));
        });
      }

      function openModal() {
        inventoryNameInput.value = "";
        inventoryDescriptionInput.value = "";
        inventoryUseByInput.value = "";
        inventoryQuantityInput.value = "";
        inventoryLocationInput.value = "";
        modalOverlay.classList.add("open");
        inventoryNameInput.focus();
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function saveItem() {
        const name = inventoryNameInput.value.trim();
        const location = inventoryLocationInput.value;

        if (!name) {
          alert("Please enter an item name.");
          return;
        }
        if (!location) {
          alert("Please select a location.");
          return;
        }

        const newItem = new Ingredient(
          "i-" + Date.now(),
          name,
          inventoryDescriptionInput.value.trim(),
          inventoryUseByInput.value || null,
          location,
          inventoryQuantityInput.value || 1
        );

        draftList.push(newItem);
        closeModal();
        renderList();
      }

      function renderList() {
        itemsUl.innerHTML = "";
        draftList.forEach((item, index) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <span>${item.name}${item.quantity && item.quantity !== 1 ? ` <span class="item-quantity">(${item.quantity})</span>` : ""}</span>
            <div class="item-action-buttons">
              <button onclick="removeItem(${index})">Remove</button>
            </div>
          `;
          itemsUl.appendChild(li);
        });
      }

      function removeItem(index) {
        draftList.splice(index, 1);
        renderList();
      }

      function createList() {
        if (draftList.length === 0) {
          alert("Add at least one item before creating a list.");
          return;
        }
        const newList = new ShoppingList(
          "l-" + Date.now(),
          listNameInput.value.trim() || "New List",
          descriptionInput.value.trim(),
          tagsInput.value.trim(),
          new Date().toISOString(),
          draftList,
          false
        );
        addShoppingList(newList);
        window.location.href = "shopping.html";
      }

      document.getElementById("add-button").addEventListener("click", openModal);
      document.getElementById("cancel-btn").addEventListener("click", closeModal);
      document.getElementById("save-item-btn").addEventListener("click", saveItem);
      inventoryNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") saveItem();
      });
      createListButton.addEventListener("click", createList);

      renderList();
    </script>
  </body>
</html>
