    <script>
      const itemInput = document.getElementById("item-input");
      const addItemButton = document.getElementById("add-item");
      const itemsUl = document.getElementById("items-ul");
      const createListButton = document.getElementById("create-list-button");

      let draftList = [];

      function renderList() {
        itemsUl.innerHTML = "";

        draftList.forEach((item, index) => {
          const li = document.createElement("li");
          li.innerHTML = `
              <span>${item}</span>
              <button onclick="removeItem(${index})">Remove</button>
            `;
          itemsUl.appendChild(li);
        });
      }

      function addItem() {
        const itemName = itemInput.value.trim();

        if (itemName !== "") {
          draftList.push(itemName);
          itemInput.value = "";
          renderList();
        }
      }

      function removeItem(index) {
        draftList.splice(index, 1);
        renderList();
      }

      function createList() {
        if (draftList.length === 0) {
          alert("Add at least one item before creating a list.");
          return;
        }

        const savedLists =
          JSON.parse(localStorage.getItem("shoppingLists")) || [];

        const newList = {
          id: Date.now(),
          name: `List ${savedLists.length + 1}`,
          items: [...draftList],
        };

        savedLists.push(newList);
        localStorage.setItem("shoppingLists", JSON.stringify(savedLists));

        alert("List created!");

        draftList = [];
        renderList();

        window.location.href = "shopping.html";
      }

      addItemButton.addEventListener("click", addItem);

      itemInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          addItem();
        }
      });

      createListButton.addEventListener("click", createList);

      renderList();
    </script>
  </body>
